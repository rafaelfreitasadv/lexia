// ═══════════════════════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function formatDate(d) { if(!d) return "—"; return new Date(d).toLocaleDateString("pt-BR"); }
function formatCurrency(v) { return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0); }
function daysUntil(date) { if(!date) return Infinity; return Math.ceil((new Date(date)-new Date())/(1000*60*60*24)); }
function isOverdue(date) { return daysUntil(date) < 0; }
function isToday(date) { return daysUntil(date) === 0; }

// ═══════════════════════════════════════════════════════════════════════════════
// NOTIFICATION SYSTEM
// ═══════════════════════════════════════════════════════════════════════════════
function NotificationBadge({ count }) {
  if(!count) return null;
  return <span style={{position:"absolute",top:"-4px",right:"-4px",background:"var(--danger)",color:"#fff",fontSize:"0.78rem",width:"16px",height:"16px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>{count}</span>;
}

}

const btnSecondary = {padding:"0.7rem 1.3rem",borderRadius:"8px",background:"rgba(255,255,255,.05)",border:"1px solid var(--border)",color:"var(--text-dim)",fontSize:"0.95rem",cursor:"pointer"};

// ═══════════════════════════════════════════════════════════════════════════════
// MONITOR DE PROCESSOS
// ═══════════════════════════════════════════════════════════════════════════════
function MonitorProcessos() {
  const [processos, setProcessos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selecionado, setSelecionado] = useState(null);
  const [ultimaAtt, setUltimaAtt] = useState(null);

  const consultar = useCallback(async () => {
    setLoading(true);
    const resultados = await Promise.all(
      PROCESSOS_CONFIG.map(async (cfg) => {
        try {
          const resp = await fetch(DATAJUD_URL, {
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`APIKey ${DATAJUD_KEY}`},
            body:JSON.stringify({query:{term:{numeroProcesso:cfg.numeroDatajud}},size:1}),
          });
          if(resp.ok) {
            const data = await resp.json();
            const source = data?.hits?.hits?.[0]?._source;
            if(source) {
              const movs = (source.movimentos||[]).slice(0,6).map(m=>({
                data: m.dataHora ? new Date(m.dataHora).toLocaleDateString("pt-BR") : "—",
                nome: m.nome||"Movimentação",
                complemento: m.complementosTabelados?.map(c=>c.nome||c.descricao).filter(Boolean).join(", ")||"",
              }));
              return {...cfg, vara:source.orgaoJulgador?.nome||"—", classe:source.classe?.nome||"—", movimentos:movs, erro:null, fonte:"DataJud"};
            }
          }
        } catch(e) {}
        // Fallback cache
        const cache = {
          "02737211920248060001":{vara:"39ª Vara Cível de Fortaleza",classe:"Procedimento Comum Cível",movimentos:[{data:"03/04/2025",nome:"Publicação",complemento:""},{data:"21/01/2025",nome:"Publicação",complemento:""}]},
          "02118496620258060001":{vara:"2ª Vara de Sucessões de Fortaleza",classe:"Inventário",movimentos:[{data:"18/09/2025",nome:"Petição",complemento:""},{data:"17/06/2025",nome:"Decurso de Prazo",complemento:""},{data:"23/04/2025",nome:"Petição",complemento:""}]},
        };
        if(cache[cfg.numeroDatajud]) return {...cfg,...cache[cfg.numeroDatajud],erro:null,fonte:"cache"};
        if(!cfg.confirmado) return {...cfg,vara:"Aguardando indexação no DataJud",classe:"—",movimentos:[],erro:"pendente",fonte:null};
        return {...cfg,vara:"—",classe:"—",movimentos:[],erro:"não localizado",fonte:null};
      })
    );
    setProcessos(resultados);
    setUltimaAtt(new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}));
    setLoading(false);
  }, []);

  useEffect(()=>{consultar();},[]);

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem",color:"var(--text)"}}>Monitor de Processos</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>DataJud/CNJ · {processos.filter(p=>p.fonte).length} de {PROCESSOS_CONFIG.length} conectados {ultimaAtt && `· ${ultimaAtt}`}</p>
        </div>
        <button onClick={consultar} disabled={loading} style={{...btnPrimary,opacity:loading?.6:1,display:"flex",alignItems:"center",gap:"0.4rem"}}>
          <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>↻</span>
          {loading?"Consultando...":"Atualizar"}
        </button>
      </div>

      <div style={{background:"var(--gold-bg)",border:"1px solid rgba(212,175,55,.18)",borderRadius:"10px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"0.73rem",color:"var(--text-mid)"}}>
        ℹ️ Processos <strong style={{color:"var(--text)"}}>Bradesco</strong> e <strong style={{color:"var(--text)"}}>Inventário</strong> confirmados no DataJud. Demais aguardam indexação (processos recentes / comarcas do interior).
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
        {(processos.length?processos:PROCESSOS_CONFIG.map(c=>({...c,movimentos:[],classe:"—",vara:"Carregando..."}))).map((proc,i)=>(
          <div key={proc.id} className="fade-in" style={{background:"rgba(255,255,255,.03)",border:`1px solid ${selecionado===i?"rgba(212,175,55,.4)":"var(--border)"}`,borderRadius:"12px",overflow:"hidden",transition:"border-color .2s"}}>
            <div onClick={()=>setSelecionado(selecionado===i?null:i)} style={{padding:"0.9rem 1.1rem",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap",marginBottom:"0.2rem"}}>
                  {proc.fonte==="DataJud"&&<span style={{background:"rgba(16,185,129,.1)",color:"var(--success)",fontSize:"0.58rem",padding:"0.1rem 0.5rem",borderRadius:"12px",border:"1px solid rgba(16,185,129,.25)"}}>● Ao vivo</span>}
                  {proc.fonte==="cache"&&<span style={{background:"var(--gold-bg)",color:"var(--gold)",fontSize:"0.58rem",padding:"0.1rem 0.5rem",borderRadius:"12px",border:"1px solid rgba(212,175,55,.25)"}}>✓ Confirmado</span>}
                  {proc.erro==="pendente"&&<span style={{background:"rgba(245,158,11,.1)",color:"var(--warning)",fontSize:"0.58rem",padding:"0.1rem 0.5rem",borderRadius:"12px",border:"1px solid rgba(245,158,11,.25)"}}>⏳ Indexando</span>}
                  {proc.classe&&proc.classe!=="—"&&<span style={{color:"var(--text-dim)",fontSize:"0.78rem"}}>{proc.classe}</span>}
                </div>
                <div style={{fontSize:"0.92rem",fontWeight:"500"}}>{proc.cliente}</div>
                <div style={{fontSize:"0.95rem",color:"var(--text-dim)",fontFamily:"monospace",marginTop:"0.1rem"}}>{proc.numero}</div>
                {proc.vara&&proc.vara!=="—"&&<div style={{fontSize:"0.95rem",color:"var(--text-dim)",marginTop:"0.05rem"}}>{proc.vara}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{color:proc.movimentos?.length?"var(--gold)":"var(--text-dim)",fontSize:"0.86rem"}}>{proc.movimentos?.length||0} mov.</div>
                <span style={{color:"var(--text-dim)",fontSize:"0.8rem",transition:"transform .2s",display:"inline-block",transform:selecionado===i?"rotate(180deg)":"none"}}>▾</span>
              </div>
            </div>
            {selecionado===i&&(
              <div style={{borderTop:"1px solid var(--border)",padding:"0.8rem 1.1rem"}}>
                {proc.movimentos?.length>0 ? proc.movimentos.map((mov,j)=>(
                  <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.5rem 0.4rem",borderRadius:"8px",marginBottom:"0.2rem"}}>
                    <div>
                      <span style={{color:"var(--gold)",fontSize:"0.88rem",fontWeight:"500"}}>{mov.nome}</span>
                      <span style={{color:"var(--text-dim)",fontSize:"0.95rem",marginLeft:"0.5rem"}}>{mov.data}</span>
                      {mov.complemento&&<div style={{color:"var(--text-dim)",fontSize:"0.86rem",marginTop:"0.1rem"}}>{mov.complemento}</div>}
                    </div>
                  </div>
                )) : <p style={{color:"var(--text-dim)",fontSize:"0.78rem"}}>{proc.erro==="pendente"?"⏳ Aguardando indexação no DataJud/CNJ.":"Nenhuma movimentação encontrada."}</p>}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// GESTÃO DE TAREFAS
// ═══════════════════════════════════════════════════════════════════════════════
function GestaoTarefas() {
  const [tarefas, setTarefas] = useState(()=>Storage.get("tarefas",[]));
  const [modal, setModal] = useState(null);
  const [filtro, setFiltro] = useState("todas");

  useEffect(()=>{Storage.set("tarefas",tarefas);},[tarefas]);

  const salvar = (t) => {
    if(t.id) { setTarefas(prev=>prev.map(x=>x.id===t.id?t:x)); }
    else { setTarefas(prev=>[{...t,id:genId(),criadoEm:new Date().toISOString()},...prev]); }
    setModal(null);
  };
  const excluir = (id) => { setTarefas(prev=>prev.filter(x=>x.id!==id)); setModal(null); };
  const toggleStatus = (id) => {
    setTarefas(prev=>prev.map(x=>{
      if(x.id!==id) return x;
      const next = x.status==="pendente"?"em_andamento":x.status==="em_andamento"?"concluida":"pendente";
      return {...x,status:next,concluidaEm:next==="concluida"?new Date().toISOString():null};
    }));
  };

  const filtradas = tarefas.filter(t=>{
    if(filtro==="todas") return true;
    if(filtro==="pendente") return t.status==="pendente";
    if(filtro==="em_andamento") return t.status==="em_andamento";
    if(filtro==="concluida") return t.status==="concluida";
    if(filtro==="vencidas") return t.status!=="concluida"&&isOverdue(t.prazo);
    return true;
  }).sort((a,b)=>{
    if(a.status==="concluida"&&b.status!=="concluida") return 1;
    if(b.status==="concluida"&&a.status!=="concluida") return -1;
    if(a.prioridade==="alta"&&b.prioridade!=="alta") return -1;
    if(!a.prazo) return 1; if(!b.prazo) return -1;
    return new Date(a.prazo)-new Date(b.prazo);
  });

  const vencidas = tarefas.filter(t=>t.status!=="concluida"&&isOverdue(t.prazo)).length;

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem"}}>Gestão de Tarefas</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>{tarefas.filter(t=>t.status!=="concluida").length} pendentes {vencidas>0&&<span style={{color:"var(--danger)"}}>· {vencidas} vencidas</span>}</p>
        </div>
        <button onClick={()=>setModal({status:"pendente",prioridade:"media",titulo:"",descricao:"",prazo:"",processoId:""})} style={{...btnPrimary,display:"flex",alignItems:"center",gap:"0.3rem"}}>{Icons.plus} Nova Tarefa</button>
      </div>

      <div style={{display:"flex",gap:"0.4rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        {[{k:"todas",l:"Todas"},{k:"pendente",l:"Pendentes"},{k:"em_andamento",l:"Em andamento"},{k:"concluida",l:"Concluídas"},{k:"vencidas",l:"Vencidas"}].map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)} style={{padding:"0.35rem 0.7rem",borderRadius:"20px",border:`1px solid ${filtro===f.k?"rgba(212,175,55,.4)":"var(--border)"}`,background:filtro===f.k?"var(--gold-bg)":"transparent",color:filtro===f.k?"var(--gold)":"var(--text-dim)",fontSize:"0.86rem",cursor:"pointer"}}>{f.l}{f.k==="vencidas"&&vencidas>0?` (${vencidas})`:""}</button>
        ))}
      </div>

      {filtradas.length===0 ? (
        <div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text-dim)"}}>
          <p style={{fontSize:"0.85rem"}}>Nenhuma tarefa {filtro!=="todas"?`com filtro "${filtro}"`:""}</p>
          <p style={{fontSize:"0.88rem",marginTop:"0.3rem"}}>Clique em "Nova Tarefa" para começar</p>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
          {filtradas.map(t=>{
            const vencida = t.status!=="concluida"&&isOverdue(t.prazo);
            const hoje = isToday(t.prazo);
            return (
              <div key={t.id} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${vencida?"rgba(239,68,68,.3)":"var(--border)"}`,borderRadius:"10px",padding:"0.8rem 1rem",display:"flex",alignItems:"flex-start",gap:"0.7rem"}}>
                <button onClick={()=>toggleStatus(t.id)} style={{marginTop:"0.1rem",width:"20px",height:"20px",borderRadius:"50%",border:`2px solid ${t.status==="concluida"?"var(--success)":t.status==="em_andamento"?"var(--gold)":"var(--text-dim)"}`,background:t.status==="concluida"?"var(--success)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                  {t.status==="concluida"&&<span style={{color:"#fff",fontSize:"0.95rem"}}>✓</span>}
                  {t.status==="em_andamento"&&<span style={{color:"var(--gold)",fontSize:"0.5rem"}}>●</span>}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:"0.85rem",color:t.status==="concluida"?"var(--text-dim)":"var(--text)",textDecoration:t.status==="concluida"?"line-through":"none"}}>{t.titulo}</span>
                    {t.prioridade==="alta"&&<span style={{fontSize:"0.55rem",background:"rgba(239,68,68,.1)",color:"var(--danger)",padding:"0.08rem 0.4rem",borderRadius:"10px",border:"1px solid rgba(239,68,68,.25)"}}>ALTA</span>}
                  </div>
                  {t.descricao&&<p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>{t.descricao}</p>}
                  <div style={{display:"flex",gap:"0.6rem",marginTop:"0.3rem",flexWrap:"wrap"}}>
                    {t.prazo&&<span style={{fontSize:"0.64rem",color:vencida?"var(--danger)":hoje?"var(--warning)":"var(--text-dim)"}}>📅 {formatDate(t.prazo)} {vencida?"(VENCIDA)":hoje?"(HOJE)":""}</span>}
                    {t.processoId&&<span style={{fontSize:"0.64rem",color:"var(--info)"}}>{Icons.processos} {PROCESSOS_CONFIG.find(p=>p.id===t.processoId)?.cliente||""}</span>}
                  </div>
                </div>
                <button onClick={()=>setModal(t)} style={{background:"none",border:"none",color:"var(--text-dim)",padding:"4px",cursor:"pointer"}}>{Icons.edit}</button>
              </div>
            );
          })}
        </div>
      )}

      {modal&&(
        <TarefaModal tarefa={modal} onSave={salvar} onDelete={modal.id?()=>excluir(modal.id):null} onClose={()=>setModal(null)}/>
      )}
    </div>
  );
}

function TarefaModal({ tarefa, onSave, onDelete, onClose }) {

          <div><label style={labelStyle}>Prazo</label><input type="date" value={form.prazo||""} onChange={e=>upd("prazo",e.target.value)} style={inputStyle}/></div>

        <div style={{display:"flex",gap:"0.6rem",justifyContent:"flex-end",marginTop:"0.5rem"}}>

      </div>
    </Modal>
  );
}

function ModuloFinanceiro() {
  const [cobrancas, setCobrancas] = useState(()=>Storage.get("cobrancas",[]));
  const [modal, setModal] = useState(null);
  const [filtro, setFiltro] = useState("todas");
  const [msgModal, setMsgModal] = useState(null);

  useEffect(()=>{Storage.set("cobrancas",cobrancas);},[cobrancas]);

  const salvar = (c) => {
    if(c.id) { setCobrancas(prev=>prev.map(x=>x.id===c.id?c:x)); }
    else { setCobrancas(prev=>[{...c,id:genId(),criadoEm:new Date().toISOString()},...prev]); }
    setModal(null);
  };
  const excluir = (id) => { setCobrancas(prev=>prev.filter(x=>x.id!==id)); setModal(null); };
  const marcarPago = (id) => { setCobrancas(prev=>prev.map(x=>x.id===id?{...x,status:"pago",pagoEm:new Date().toISOString()}:x)); };

  const filtradas = cobrancas.filter(c=>{
    if(filtro==="todas") return true;

    if(filtro==="pago") return c.status==="pago";
    return true;
  }).sort((a,b)=>{
    if(a.status==="pago"&&b.status!=="pago") return 1;

    return new Date(a.vencimento)-new Date(b.vencimento);

  const totalPendente = cobrancas.filter(c=>c.status==="pendente").reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const totalRecebido = cobrancas.filter(c=>c.status==="pago").reduce((s,c)=>s+(parseFloat(c.valor)||0),0);
  const vencidas = cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento));

  const gerarMsgWhatsApp = (c) => {

    return msg;
  };

    return `Assunto: Lembrete de Pagamento — Honorários Advocatícios\n\nPrezado(a) ${c.clienteNome||"Cliente"},\n\nVimos, respeitosamente, lembrá-lo(a) da parcela de honorários no valor de ${formatCurrency(c.valor)}, com vencimento em ${formatDate(c.vencimento)}.\n\nPara sua conveniência, segue a chave Pix para pagamento:\n📧 rafaelfreitassadv@gmail.com\n\nCaso já tenha efetuado o pagamento, por favor desconsidere esta mensagem.\n\nAtenciosamente,\n\nRafael Freitas Mariano de Oliveira\nAdvogado — OAB/CE 44.172\nAv. Ministro José Américo, 326, Sl 711/712\nCambeba — Fortaleza/CE`;
  };

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem"}}>Financeiro & Cobranças</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>Controle de honorários e lembretes</p>
        </div>
        <button onClick={()=>setModal({status:"pendente",tipo:"honorario",valor:"",clienteNome:"",descricao:"",vencimento:"",processoId:"",telefone:"",email:""})} style={{...btnPrimary,display:"flex",alignItems:"center",gap:"0.3rem"}}>{Icons.plus} Nova Cobrança</button>

      {/* Resumo cards */}

          <div style={{fontSize:"0.62rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>A Receber</div>
          <div style={{fontSize:"1.4rem",color:"var(--warning)",fontWeight:"bold",marginTop:"0.2rem"}}>{formatCurrency(totalPendente)}</div>
        </div>
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Recebido</div>
          <div style={{fontSize:"1.4rem",color:"var(--success)",fontWeight:"bold",marginTop:"0.2rem"}}>{formatCurrency(totalRecebido)}</div>

        </div>

      {/* Alertas de vencidas */}
      {vencidas.length>0&&(
        <div style={{background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.2)",borderRadius:"10px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"0.75rem",color:"var(--danger)"}}>

          <button key={f.k} onClick={()=>setFiltro(f.k)} style={{padding:"0.35rem 0.7rem",borderRadius:"20px",border:`1px solid ${filtro===f.k?"rgba(212,175,55,.4)":"var(--border)"}`,background:filtro===f.k?"var(--gold-bg)":"transparent",color:filtro===f.k?"var(--gold)":"var(--text-dim)",fontSize:"0.86rem",cursor:"pointer"}}>{f.l}</button>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"0.5rem"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
                      <span style={{fontSize:"0.88rem",fontWeight:"500"}}>{c.clienteNome||"Cliente"}</span>

                      {c.processoId&&<span>{Icons.processos} {PROCESSOS_CONFIG.find(p=>p.id===c.processoId)?.cliente||""}</span>}

                        <button onClick={()=>setMsgModal({tipo:"email",cobranca:c})} title="Lembrete Email" style={{background:"rgba(59,130,246,.08)",border:"1px solid rgba(59,130,246,.25)",color:"var(--info)",padding:"0.3rem 0.4rem",borderRadius:"6px",cursor:"pointer"}}>{Icons.email}</button>
                      </>

                  </div>

              </div>
            );

      )}

      {modal&&<CobrancaModal cobranca={modal} onSave={salvar} onDelete={modal.id?()=>excluir(modal.id):null} onClose={()=>setModal(null)}/>}
      {msgModal&&<MensagemModal {...msgModal} onClose={()=>setMsgModal(null)} gerarWhatsApp={gerarMsgWhatsApp} gerarEmail={gerarMsgEmail}/>}
    </div>
  );
}

function CobrancaModal({ cobranca, onSave, onDelete, onClose }) {

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem"}}>

          <div><label style={labelStyle}>Email</label><input value={form.email||""} onChange={e=>upd("email",e.target.value)} style={inputStyle} placeholder="cliente@email.com"/></div>
        </div>
        <div><label style={labelStyle}>Processo vinculado</label><select value={form.processoId||""} onChange={e=>upd("processoId",e.target.value)} style={inputStyle}><option value="">Nenhum</option>{PROCESSOS_CONFIG.map(p=><option key={p.id} value={p.id}>{p.cliente}</option>)}</select></div>
        <div style={{display:"flex",gap:"0.6rem",justifyContent:"flex-end",marginTop:"0.5rem"}}>
          {onDelete&&<button onClick={onDelete} style={{...btnSecondary,color:"var(--danger)",borderColor:"rgba(239,68,68,.3)",marginRight:"auto"}}>Excluir</button>}
          <button onClick={onClose} style={btnSecondary}>Cancelar</button>
          <button onClick={()=>form.clienteNome&&form.valor&&onSave(form)} style={{...btnPrimary,opacity:form.clienteNome&&form.valor?1:.5}}>Salvar</button>
        </div>
      </div>
    </Modal>
  );
}

function MensagemModal({ tipo, cobranca, onClose, gerarWhatsApp, gerarEmail }) {
  const msg = tipo==="whatsapp" ? gerarWhatsApp(cobranca) : gerarEmail(cobranca);
  const copiar = () => { navigator.clipboard.writeText(msg); };
  const enviarWhatsApp = () => {
    const tel = (cobranca.telefone||"").replace(/\D/g,"");
    if(tel) window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`,"_blank");
    else alert("Telefone não cadastrado para este cliente.");
  };
  const enviarEmail = () => {
    const email = cobranca.email||"";
    if(email) window.open(`mailto:${email}?subject=${encodeURIComponent("Lembrete de Pagamento — Honorários")}&body=${encodeURIComponent(msg)}`,"_blank");
    else alert("Email não cadastrado para este cliente.");
  };

  return (
    <Modal title={tipo==="whatsapp"?"Lembrete via WhatsApp":"Lembrete via Email"} onClose={onClose} width="560px">
      <div style={{background:"rgba(255,255,255,.03)",borderRadius:"8px",padding:"0.8rem",marginBottom:"1rem",border:"1px solid var(--border)"}}>
        <pre style={{fontSize:"0.9rem",color:"var(--text-mid)",whiteSpace:"pre-wrap",lineHeight:1.65,fontFamily:"inherit"}}>{msg}</pre>
      </div>
      <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
        <button onClick={copiar} style={btnSecondary}>Copiar</button>
        {tipo==="whatsapp" ? (
          <button onClick={enviarWhatsApp} style={{...btnPrimary,background:"linear-gradient(135deg,#25d366,#128c7e)"}}>Abrir WhatsApp</button>
        ) : (
          <button onClick={enviarEmail} style={{...btnPrimary,background:"linear-gradient(135deg,var(--info),#1d4ed8)"}}>Abrir Email</button>
        )}
      </div>
    </Modal>
  );
}

function Configuracoes() {
  const [config, setConfig] = useState(()=>Storage.get("config",{pixKey:"rafaelfreitassadv@gmail.com",telefone:"",anthropicKey:""}));
  const upd = (k,v) => { const n={...config,[k]:v}; setConfig(n); Storage.set("config",n); };

  const limparDados = () => {
    if(confirm("Tem certeza? Isso apagará TODAS as tarefas e cobranças. Os processos do DataJud não serão afetados.")) {
      Storage.remove("tarefas"); Storage.remove("cobrancas");
      location.reload();
    }
  };
  const exportarDados = () => {
    const dados = {tarefas:Storage.get("tarefas",[]),cobrancas:Storage.get("cobrancas",[]),config:Storage.get("config",{}),exportadoEm:new Date().toISOString()};
    const blob = new Blob([JSON.stringify(dados,null,2)],{type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`lexia_backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url);
  };
  const importarDados = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const dados = JSON.parse(ev.target.result);
        if(dados.tarefas) Storage.set("tarefas",dados.tarefas);
        if(dados.cobrancas) Storage.set("cobrancas",dados.cobrancas);
        if(dados.config) Storage.set("config",dados.config);
        alert("Dados importados com sucesso!"); location.reload();
      } catch { alert("Arquivo inválido."); }
    };
    reader.readAsText(file);
  };

  return (
    <div className="fade-in">
      <h2 style={{fontSize:"1.3rem",marginBottom:"1.2rem"}}>Configurações</h2>

      <div style={{display:"flex",flexDirection:"column",gap:"1.2rem"}}>
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1.2rem"}}>
          <h3 style={{fontSize:"0.95rem",color:"var(--gold)",marginBottom:"0.8rem"}}>Dados do Escritório</h3>
          <div style={{display:"flex",flexDirection:"column",gap:"0.7rem"}}>
            <div><label style={labelStyle}>Chave Pix (para cobranças)</label><input value={config.pixKey||""} onChange={e=>upd("pixKey",e.target.value)} style={inputStyle}/></div>
            <div><label style={labelStyle}>Telefone WhatsApp do escritório</label><input value={config.telefone||""} onChange={e=>upd("telefone",e.target.value)} style={inputStyle} placeholder="85999999999"/></div>
          </div>
        </div>

        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1.2rem"}}>
          <h3 style={{fontSize:"0.95rem",color:"var(--gold)",marginBottom:"0.8rem"}}>API Keys</h3>
          <div style={{display:"flex",flexDirection:"column",gap:"0.7rem"}}>
            <div><label style={labelStyle}>Anthropic API Key (para análise IA)</label><input type="password" value={config.anthropicKey||""} onChange={e=>upd("anthropicKey",e.target.value)} style={inputStyle} placeholder="sk-ant-..."/></div>
            <p style={{fontSize:"0.84rem",color:"var(--text-dim)"}}>Necessária apenas para o recurso de análise de movimentações com IA. A chave DataJud já está embutida.</p>
          </div>
        </div>

        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1.2rem"}}>
          <h3 style={{fontSize:"0.95rem",color:"var(--gold)",marginBottom:"0.8rem"}}>Backup & Dados</h3>
          <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
            <button onClick={exportarDados} style={btnSecondary}>Exportar Backup</button>
            <label style={{...btnSecondary,display:"inline-flex",alignItems:"center"}}>Importar<input type="file" accept=".json" onChange={importarDados} style={{display:"none"}}/></label>
            <button onClick={limparDados} style={{...btnSecondary,color:"var(--danger)",borderColor:"rgba(239,68,68,.3)"}}>Limpar Tudo</button>
          </div>
          <p style={{fontSize:"0.95rem",color:"var(--text-dim)",marginTop:"0.6rem"}}>Os dados são salvos no navegador (localStorage). Faça backup regularmente.</p>
        </div>

        <div style={{background:"var(--gold-bg)",border:"1px solid rgba(212,175,55,.18)",borderRadius:"12px",padding:"1.2rem"}}>
          <h3 style={{fontSize:"0.95rem",color:"var(--gold)",marginBottom:"0.5rem"}}>Deploy no GitHub Pages</h3>
          <ol style={{fontSize:"0.9rem",color:"var(--text-mid)",lineHeight:1.8,paddingLeft:"1.2rem"}}>
            <li>Crie um repositório no GitHub (ex: <code style={{color:"var(--gold)"}}>lexia</code>)</li>
            <li>Faça upload deste arquivo <code style={{color:"var(--gold)"}}>index.html</code></li>
            <li>Vá em Settings → Pages → Source: "main" / root</li>
            <li>Acesse em: <code style={{color:"var(--gold)"}}>seuusuario.github.io/lexia</code></li>
          </ol>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// DASHBOARD (HOME)
// ═══════════════════════════════════════════════════════════════════════════════
function Dashboard({ setPage }) {
  const tarefas = Storage.get("tarefas",[]);
  const cobrancas = Storage.get("cobrancas",[]);
  const tarefasVencidas = tarefas.filter(t=>t.status!=="concluida"&&isOverdue(t.prazo));
  const tarefasHoje = tarefas.filter(t=>t.status!=="concluida"&&isToday(t.prazo));
  const cobrancasVencidas = cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento));
  const totalReceber = cobrancas.filter(c=>c.status==="pendente").reduce((s,c)=>s+(parseFloat(c.valor)||0),0);

  const alertas = [...tarefasVencidas.map(t=>({tipo:"tarefa",msg:`Tarefa vencida: ${t.titulo}`,cor:"var(--danger)"})),...cobrancasVencidas.map(c=>({tipo:"cobranca",msg:`Cobrança vencida: ${c.clienteNome} — ${formatCurrency(c.valor)}`,cor:"var(--danger)"})),...tarefasHoje.map(t=>({tipo:"tarefa",msg:`Vence hoje: ${t.titulo}`,cor:"var(--warning)"}))];

  return (
    <div className="fade-in">
      <div style={{marginBottom:"1.5rem"}}>
        <h2 style={{fontSize:"1.4rem"}}>Bom dia, Dr. Rafael</h2>
        <p style={{fontSize:"0.92rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>{new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p>
      </div>

      {alertas.length>0&&(
        <div style={{background:"rgba(239,68,68,.05)",border:"1px solid rgba(239,68,68,.2)",borderRadius:"12px",padding:"0.9rem 1rem",marginBottom:"1.2rem"}}>
          <div style={{fontSize:"0.88rem",color:"var(--danger)",fontWeight:"600",marginBottom:"0.5rem"}}>{Icons.bell} {alertas.length} alerta(s)</div>
          {alertas.slice(0,5).map((a,i)=><div key={i} style={{fontSize:"0.9rem",color:a.cor,marginBottom:"0.25rem"}}>• {a.msg}</div>)}
          {alertas.length>5&&<div style={{fontSize:"0.84rem",color:"var(--text-dim)",marginTop:"0.3rem"}}>+{alertas.length-5} mais...</div>}
        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"0.8rem",marginBottom:"1.5rem"}}>
        <div onClick={()=>setPage("processos")} style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1.2rem",cursor:"pointer",transition:"border-color .2s"}}>
          <div style={{color:"var(--info)",marginBottom:"0.4rem"}}>{Icons.processos}</div>
          <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--info)"}}>{PROCESSOS_CONFIG.length}</div>
          <div style={{fontSize:"0.84rem",color:"var(--text-dim)",marginTop:"0.1rem"}}>Processos ativos</div>
        </div>
        <div onClick={()=>setPage("tarefas")} style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1.2rem",cursor:"pointer"}}>
          <div style={{color:"var(--gold)",marginBottom:"0.4rem"}}>{Icons.tarefas}</div>
          <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--gold)"}}>{tarefas.filter(t=>t.status!=="concluida").length}</div>
          <div style={{fontSize:"0.84rem",color:"var(--text-dim)",marginTop:"0.1rem"}}>Tarefas pendentes</div>
        </div>
        <div onClick={()=>setPage("financeiro")} style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1.2rem",cursor:"pointer"}}>
          <div style={{color:"var(--success)",marginBottom:"0.4rem"}}>{Icons.financeiro}</div>
          <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--success)"}}>{formatCurrency(totalReceber)}</div>
          <div style={{fontSize:"0.84rem",color:"var(--text-dim)",marginTop:"0.1rem"}}>A receber</div>
        </div>
      </div>

      {/* Próximas tarefas */}
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.7rem"}}>
          <h3 style={{fontSize:"0.95rem",color:"var(--gold)"}}>Próximas Tarefas</h3>
          <button onClick={()=>setPage("tarefas")} style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:"0.86rem",cursor:"pointer"}}>Ver todas →</button>
        </div>
        {tarefas.filter(t=>t.status!=="concluida").slice(0,4).map(t=>(
          <div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0",borderBottom:"1px solid var(--border)",fontSize:"0.92rem"}}>
            <span style={{color:"var(--text)"}}>{t.titulo}</span>
            <span style={{color:isOverdue(t.prazo)?"var(--danger)":"var(--text-dim)",fontSize:"0.84rem"}}>{t.prazo?formatDate(t.prazo):"sem prazo"}</span>
          </div>
        ))}
        {tarefas.filter(t=>t.status!=="concluida").length===0&&<p style={{fontSize:"0.9rem",color:"var(--text-dim)"}}>Nenhuma tarefa pendente</p>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [page, setPage] = useState("dashboard");
  const [menuOpen, setMenuOpen] = useState(false);

  const tarefas = Storage.get("tarefas",[]);
  const cobrancas = Storage.get("cobrancas",[]);
  const alertCount = tarefas.filter(t=>t.status!=="concluida"&&isOverdue(t.prazo)).length + cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento)).length;

  const navItems = [
    {id:"dashboard",label:"Início",icon:Icons.home},
    {id:"processos",label:"Processos",icon:Icons.processos},
    {id:"tarefas",label:"Tarefas",icon:Icons.tarefas},
    {id:"financeiro",label:"Financeiro",icon:Icons.financeiro},
    {id:"config",label:"Config",icon:Icons.config},
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Sidebar Desktop */}
      <aside style={{width:"220px",background:"rgba(5,10,25,.98)",borderRight:"1px solid var(--border)",padding:"1.2rem 0",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100}}>
        <div style={{padding:"0 1rem",marginBottom:"1.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <div style={{width:"34px",height:"34px",borderRadius:"8px",background:"linear-gradient(135deg,var(--gold),#9a7d0a)",display:"flex",alignItems:"center",justifyContent:"center",color:"#0a1628"}}>{Icons.balance}</div>
            <div>
              <div style={{fontSize:"0.78rem",fontWeight:"600",color:"var(--text)",lineHeight:1.3}}>Rafael Freitas</div>
              <div style={{fontSize:"0.62rem",color:"var(--gold)",letterSpacing:"0.06em"}}>ADVOCACIA | OAB/CE 44.172</div>
            </div>
          </div>
        </div>
        <nav style={{flex:1}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:"0.7rem",padding:"0.75rem 1.2rem",background:page===item.id?"var(--gold-bg)":"transparent",border:"none",borderLeft:page===item.id?"3px solid var(--gold)":"3px solid transparent",color:page===item.id?"var(--gold)":"var(--text-dim)",fontSize:"0.92rem",cursor:"pointer",textAlign:"left",transition:"all .15s",position:"relative"}}>
              <span style={{display:"flex"}}>{item.icon}</span>{item.label}
              {item.id==="financeiro"&&alertCount>0&&<NotificationBadge count={alertCount}/>}
            </button>
          ))}
        </nav>
        <div style={{padding:"0 1rem",fontSize:"0.78rem",color:"var(--text-dim)",lineHeight:1.6}}>
          Rafael Freitas Advocacia<br/>Fortaleza/CE
        </div>
      </aside>

      {/* Mobile Header */}
      <div className="mobile-header" style={{display:"none",position:"fixed",top:0,left:0,right:0,zIndex:200,background:"rgba(5,10,25,.98)",borderBottom:"1px solid var(--border)",padding:"0.7rem 1rem",alignItems:"center",justifyContent:"space-between",backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <div style={{width:"30px",height:"30px",borderRadius:"6px",background:"linear-gradient(135deg,var(--gold),#9a7d0a)",display:"flex",alignItems:"center",justifyContent:"center",color:"#0a1628"}}>{Icons.balance}</div>
          <span style={{fontSize:"0.88rem",fontWeight:"600"}}>Rafael Freitas Advocacia</span>
        </div>
        <button onClick={()=>setMenuOpen(!menuOpen)} style={{background:"none",border:"none",color:"var(--text)",padding:"4px",position:"relative"}}>
          {menuOpen?Icons.close:Icons.menu}
          {alertCount>0&&!menuOpen&&<NotificationBadge count={alertCount}/>}
        </button>
      </div>

      {/* Mobile Nav Overlay */}
      {menuOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:150,background:"rgba(5,10,25,.97)",paddingTop:"60px"}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>{setPage(item.id);setMenuOpen(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:"0.8rem",padding:"1rem 1.5rem",background:page===item.id?"var(--gold-bg)":"transparent",border:"none",color:page===item.id?"var(--gold)":"var(--text)",fontSize:"1rem",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:"1.3rem"}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      )}

      {/* Main Content */}
      <main style={{flex:1,marginLeft:"220px",padding:"1.5rem",maxWidth:"900px"}}>
        {page==="dashboard"&&<Dashboard setPage={setPage}/>}
        {page==="processos"&&<MonitorProcessos/>}
        {page==="tarefas"&&<GestaoTarefas/>}
        {page==="financeiro"&&<ModuloFinanceiro/>}
        {page==="config"&&<Configuracoes/>}
      </main>

      {/* Responsive CSS */}
      <style>{`
        @media(max-width:768px){
          aside{display:none!important}
          .mobile-header{display:flex!important}
          main{margin-left:0!important;padding:1rem!important;padding-top:65px!important;max-width:100%!important}
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
