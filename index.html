// WHATSAPP API CLIENT (waTidy / Wascript)
// ═══════════════════════════════════════════════════════════════════════════════
const WaTidy = {
  baseUrl: "https://api-whatsapp.wascript.com.br",
  getToken() { return (Storage.get("config",{}).watidyToken) || ""; },
  setToken(t) { const c = Storage.get("config",{}); c.watidyToken = t; Storage.set("config", c); },
  formatPhone(raw) {
    let n = (raw||"").replace(/\D/g,"");
    if (!n) return "";
    if (n.startsWith("55") && (n.length===12 || n.length===13)) return n;
    if (n.length===10 || n.length===11) return "55"+n;
    return n;
  },
  async _post(path, body) {
    const token = this.getToken();
    if (!token) throw new Error("Token waTidy não configurado. Vá em Configurações → WhatsApp.");
    const res = await fetch(`${this.baseUrl}${path}/${token}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    let data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok) throw new Error(data.message || data.error || `Erro HTTP ${res.status}`);
    return data;
  },
  async _get(path, query) {
    const token = this.getToken();
    if (!token) throw new Error("Token waTidy não configurado.");
    const qs = query ? "?"+new URLSearchParams(query).toString() : "";
    const res = await fetch(`${this.baseUrl}${path}/${token}${qs}`);
    let data = {};
    try { data = await res.json(); } catch {}
    if (!res.ok) throw new Error(data.message || `Erro HTTP ${res.status}`);
    return data;
  },
  async enviarTexto(phone, message) {
    const tel = this.formatPhone(phone);
    if (!tel) throw new Error("Telefone inválido");
    if (!message || !message.trim()) throw new Error("Mensagem vazia");
    return this._post("/api/enviar-texto", { phone: tel, message });
  },
  async enviarImagem(phone, base64, message) {
    const tel = this.formatPhone(phone);
    if (!tel) throw new Error("Telefone inválido");
    const body = { phone: tel, base64 };
    if (message) body.message = message;
    return this._post("/api/enviar-imagem", body);
  },
  async enviarDocumento(phone, base64, name) {
    const tel = this.formatPhone(phone);
    if (!tel) throw new Error("Telefone inválido");
    const body = { phone: tel, base64 };
    if (name) body.name = name;
    return this._post("/api/enviar-documento", body);
  },
  async enviarAudio(phone, base64) {
    const tel = this.formatPhone(phone);
    if (!tel) throw new Error("Telefone inválido");
    return this._post("/api/enviar-audio", { phone: tel, base64 });
  },
  async criarNota(userID, text) {
    return this._post("/api/criar-nota", { userID, text });
  },
  async listarEtiquetas() { return this._get("/api/listar-etiquetas"); },
  fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }
};

const DJEN_API_URL = "https://comunicaapi.pje.jus.br/api/v1/comunicacao";
const DJEN = {
  async listar({ pagina=1, itensPorPagina=30, dataInicio=null, dataFim=null, siglaTribunal=null }={}) {
    const qs = new URLSearchParams({
      numeroOab: OAB_NUMERO,
      siglaUfOab: OAB_UF,
      itensPorPagina: String(itensPorPagina),
      pagina: String(pagina),
    });
    if (dataInicio) qs.set("dataDisponibilizacaoInicio", dataInicio);
    if (dataFim) qs.set("dataDisponibilizacaoFim", dataFim);
    if (siglaTribunal) qs.set("siglaTribunal", siglaTribunal);
    const resp = await fetch(`${DJEN_API_URL}?${qs.toString()}`);
    if (!resp.ok) throw new Error(`DJEN HTTP ${resp.status}`);
    return resp.json();
  },
  // Mapeia o item bruto do DJEN para o schema interno do Lexia
  toLexia(item) {
    return {
      id: String(item.id),
      hash: item.hash,
      numeroComunicacao: item.numeroComunicacao,
      tribunal: item.siglaTribunal || "—",
      orgao: item.nomeOrgao || "—",
      tipo: item.tipoComunicacao || "—",
      tipoDocumento: item.tipoDocumento || "",
      classe: item.nomeClasse || "",
      processo: item.numeroprocessocommascara || item.numero_processo || "",
      processoCru: item.numero_processo || "",
      dataDisponibilizacao: item.data_disponibilizacao || "",
      dataDisponibilizacaoBR: item.datadisponibilizacao || "",
      meio: item.meiocompleto || item.meio || "",
      link: item.link || "",
      texto: item.texto || "",
      destinatarios: (item.destinatarios||[]).map(d=>({nome:d.nome, polo:d.polo})),
      advogados: (item.destinatarioadvogados||[]).map(da=>({
        nome: da.advogado?.nome || "",
        oab: da.advogado?.oab || ""
      })),
    };
  }
};

// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function formatDate(d) { if(!d) return "—"; return new Date(d).toLocaleDateString("pt-BR"); }
function formatCurrency(v) { return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0); }
function daysUntil(date) { if(!date) return Infinity; return Math.ceil((new Date(date)-new Date())/(1000*60*60*24)); }
function isOverdue(date) { return daysUntil(date) < 0; }
function isToday(date) { return daysUntil(date) === 0; }

// ═══════════════════════════════════════════════════════════════════════════════
function NotificationBadge({ count }) {
  if(!count) return null;
  return <span style={{position:"absolute",top:"-4px",right:"-4px",background:"var(--danger)",color:"#fff",fontSize:"0.78rem",width:"16px",height:"16px",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>{count}</span>;
}

// ═══════════════════════════════════════════════════════════════════════════════
// MODAL COMPONENT
// ═══════════════════════════════════════════════════════════════════════════════
function Modal({ title, onClose, children, width="520px" }) {
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(3,8,20,.92)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000,backdropFilter:"blur(8px)",padding:"1rem"}}>
      <div onClick={e=>e.stopPropagation()} className="fade-in" style={{background:"linear-gradient(145deg,#0d1a30,#080f1e)",border:"1px solid rgba(212,175,55,.3)",borderRadius:"16px",maxWidth:width,width:"100%",maxHeight:"90vh",overflow:"auto",padding:"1.5rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.2rem"}}>
          <h3 style={{color:"var(--gold)",fontSize:"0.95rem",fontWeight:"600"}}>{title}</h3>
          <button onClick={onClose} style={{background:"none",border:"none",color:"var(--text-dim)",padding:"4px"}}>{Icons.close}</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// INPUT COMPONENTS
// ═══════════════════════════════════════════════════════════════════════════════
const inputStyle = {width:"100%",padding:"0.7rem 0.9rem",borderRadius:"8px",background:"rgba(255,255,255,.04)",border:"1px solid var(--border)",color:"var(--text)",fontSize:"0.95rem",outline:"none"};
const labelStyle = {display:"block",fontSize:"0.8rem",color:"var(--text-mid)",marginBottom:"0.35rem",textTransform:"uppercase",letterSpacing:"0.05em"};
const btnPrimary = {padding:"0.7rem 1.3rem",borderRadius:"8px",background:"linear-gradient(135deg,var(--gold),#9a7d0a)",border:"none",color:"#000",fontSize:"0.95rem",fontWeight:"600",cursor:"pointer"};
const btnSecondary = {padding:"0.7rem 1.3rem",borderRadius:"8px",background:"rgba(255,255,255,.05)",border:"1px solid var(--border)",color:"var(--text-dim)",fontSize:"0.95rem",cursor:"pointer"};

// ═══════════════════════════════════════════════════════════════════════════════
// MONITOR DE PROCESSOS — LISTA (aba "Processos")
// ═══════════════════════════════════════════════════════════════════════════════
function MonitorProcessosLista() {
  const [processos, setProcessos] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selecionado, setSelecionado] = useState(null);
  const [ultimaAtt, setUltimaAtt] = useState(null);

  const consultar = useCallback(async () => {
    setLoading(true);
    const resultados = await Promise.all(
      PROCESSOS_CONFIG.map(async (cfg) => {
        try {
          const resp = await fetch(DATAJUD_URL, {
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`APIKey ${DATAJUD_KEY}`},
            body:JSON.stringify({query:{term:{numeroProcesso:cfg.numeroDatajud}},size:1}),
          });
          if(resp.ok) {
            const data = await resp.json();
            const source = data?.hits?.hits?.[0]?._source;
            if(source) {
              const movs = (source.movimentos||[]).slice(0,6).map(m=>({
                data: m.dataHora ? new Date(m.dataHora).toLocaleDateString("pt-BR") : "—",
                nome: m.nome||"Movimentação",
                complemento: m.complementosTabelados?.map(c=>c.nome||c.descricao).filter(Boolean).join(", ")||"",
              }));
              return {...cfg, vara:source.orgaoJulgador?.nome||"—", classe:source.classe?.nome||"—", movimentos:movs, erro:null, fonte:"DataJud"};
            }
          }
        } catch(e) {}
        // Fallback cache
        const cache = {
          "02737211920248060001":{vara:"39ª Vara Cível de Fortaleza",classe:"Procedimento Comum Cível",movimentos:[{data:"03/04/2025",nome:"Publicação",complemento:""},{data:"21/01/2025",nome:"Publicação",complemento:""}]},
          "02118496620258060001":{vara:"2ª Vara de Sucessões de Fortaleza",classe:"Inventário",movimentos:[{data:"18/09/2025",nome:"Petição",complemento:""},{data:"17/06/2025",nome:"Decurso de Prazo",complemento:""},{data:"23/04/2025",nome:"Petição",complemento:""}]},
        };
        if(cache[cfg.numeroDatajud]) return {...cfg,...cache[cfg.numeroDatajud],erro:null,fonte:"cache"};
        if(!cfg.confirmado) return {...cfg,vara:"Aguardando indexação no DataJud",classe:"—",movimentos:[],erro:"pendente",fonte:null};
        return {...cfg,vara:"—",classe:"—",movimentos:[],erro:"não localizado",fonte:null};
      })
    );
    setProcessos(resultados);
    setUltimaAtt(new Date().toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}));
    setLoading(false);
  }, []);

  useEffect(()=>{consultar();},[]);

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem",color:"var(--text)"}}>Monitor de Processos</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>DataJud/CNJ · {processos.filter(p=>p.fonte).length} de {PROCESSOS_CONFIG.length} conectados {ultimaAtt && `· ${ultimaAtt}`}</p>
        </div>
        <button onClick={consultar} disabled={loading} style={{...btnPrimary,opacity:loading?.6:1,display:"flex",alignItems:"center",gap:"0.4rem"}}>
          <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>↻</span>
          {loading?"Consultando...":"Atualizar"}
        </button>
      </div>

      <div style={{background:"var(--gold-bg)",border:"1px solid rgba(212,175,55,.18)",borderRadius:"10px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"0.73rem",color:"var(--text-mid)"}}>
        ℹ️ Processos <strong style={{color:"var(--text)"}}>Bradesco</strong> e <strong style={{color:"var(--text)"}}>Inventário</strong> confirmados no DataJud. Demais aguardam indexação (processos recentes / comarcas do interior).
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:"0.6rem"}}>
        {(processos.length?processos:PROCESSOS_CONFIG.map(c=>({...c,movimentos:[],classe:"—",vara:"Carregando..."}))).map((proc,i)=>(
          <div key={proc.id} className="fade-in" style={{background:"rgba(255,255,255,.03)",border:`1px solid ${selecionado===i?"rgba(212,175,55,.4)":"var(--border)"}`,borderRadius:"12px",overflow:"hidden",transition:"border-color .2s"}}>
            <div onClick={()=>setSelecionado(selecionado===i?null:i)} style={{padding:"0.9rem 1.1rem",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap",marginBottom:"0.2rem"}}>
                  {proc.fonte==="DataJud"&&<span style={{background:"rgba(16,185,129,.1)",color:"var(--success)",fontSize:"0.58rem",padding:"0.1rem 0.5rem",borderRadius:"12px",border:"1px solid rgba(16,185,129,.25)"}}>● Ao vivo</span>}
                  {proc.fonte==="cache"&&<span style={{background:"var(--gold-bg)",color:"var(--gold)",fontSize:"0.58rem",padding:"0.1rem 0.5rem",borderRadius:"12px",border:"1px solid rgba(212,175,55,.25)"}}>✓ Confirmado</span>}
                  {proc.erro==="pendente"&&<span style={{background:"rgba(245,158,11,.1)",color:"var(--warning)",fontSize:"0.58rem",padding:"0.1rem 0.5rem",borderRadius:"12px",border:"1px solid rgba(245,158,11,.25)"}}>⏳ Indexando</span>}
                  {proc.classe&&proc.classe!=="—"&&<span style={{color:"var(--text-dim)",fontSize:"0.78rem"}}>{proc.classe}</span>}
                </div>
                <div style={{fontSize:"0.92rem",fontWeight:"500"}}>{proc.cliente}</div>
                <div style={{fontSize:"0.95rem",color:"var(--text-dim)",fontFamily:"monospace",marginTop:"0.1rem"}}>{proc.numero}</div>
                {proc.vara&&proc.vara!=="—"&&<div style={{fontSize:"0.95rem",color:"var(--text-dim)",marginTop:"0.05rem"}}>{proc.vara}</div>}
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{color:proc.movimentos?.length?"var(--gold)":"var(--text-dim)",fontSize:"0.86rem"}}>{proc.movimentos?.length||0} mov.</div>
                <span style={{color:"var(--text-dim)",fontSize:"0.8rem",transition:"transform .2s",display:"inline-block",transform:selecionado===i?"rotate(180deg)":"none"}}>▾</span>
              </div>
            </div>
            {selecionado===i&&(
              <div style={{borderTop:"1px solid var(--border)",padding:"0.8rem 1.1rem"}}>
                {proc.movimentos?.length>0 ? proc.movimentos.map((mov,j)=>(
                  <div key={j} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.5rem 0.4rem",borderRadius:"8px",marginBottom:"0.2rem"}}>
                    <div>
                      <span style={{color:"var(--gold)",fontSize:"0.88rem",fontWeight:"500"}}>{mov.nome}</span>
                      <span style={{color:"var(--text-dim)",fontSize:"0.95rem",marginLeft:"0.5rem"}}>{mov.data}</span>
                      {mov.complemento&&<div style={{color:"var(--text-dim)",fontSize:"0.86rem",marginTop:"0.1rem"}}>{mov.complemento}</div>}
                    </div>
                  </div>
                )) : <p style={{color:"var(--text-dim)",fontSize:"0.78rem"}}>{proc.erro==="pendente"?"⏳ Aguardando indexação no DataJud/CNJ.":"Nenhuma movimentação encontrada."}</p>}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// PUBLICAÇÕES — Aba dentro do Monitor de Processos
// Captação automática via DJEN/CNJ por OAB (44.172/CE)
// ═══════════════════════════════════════════════════════════════════════════════
const ESTADOS_BR = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

function Publicacoes() {
  // estado salvo
  const [tratamentos, setTratamentos] = useState(()=>Storage.get("publicTratamentos",{}));
  const [vinculacoes, setVinculacoes] = useState(()=>Storage.get("publicVinculacoes",{}));
  const [ultimaSync, setUltimaSync] = useState(()=>Storage.get("publicUltimaSync",null));

  // estado em memória
  const [publicacoes, setPublicacoes] = useState([]);
  const [total, setTotal] = useState(0);
  const [loading, setLoading] = useState(false);
  const [erro, setErro] = useState(null);
  const [pagina, setPagina] = useState(1);
  const [busca, setBusca] = useState("");
  const [filtroStatus, setFiltroStatus] = useState("nao_tratada"); // nao_tratada | tratada | descartada | todas
  const [filtroEstado, setFiltroEstado] = useState("todos");
  const [expandido, setExpandido] = useState(null);
  const [vincModal, setVincModal] = useState(null);
  const itensPorPagina = 30;

  useEffect(()=>{Storage.set("publicTratamentos",tratamentos);},[tratamentos]);
  useEffect(()=>{Storage.set("publicVinculacoes",vinculacoes);},[vinculacoes]);
  useEffect(()=>{Storage.set("publicUltimaSync",ultimaSync);},[ultimaSync]);

  // status de cada publicação (default: não tratada)
  const getStatus = (id) => tratamentos[id] || "nao_tratada";
  const setStatus = (id, status) => {
    setTratamentos(prev => ({...prev, [id]: status}));
  };
  const isHoje = (dataISO) => dataISO === new Date().toISOString().slice(0,10);

  const carregar = useCallback(async () => {
    setLoading(true); setErro(null);
    try {
      const data = await DJEN.listar({
        pagina,
        itensPorPagina,
        siglaTribunal: filtroEstado !== "todos" ? null : null, // a API filtra por siglaTribunal específica (TJCE etc.) — não por UF da OAB
      });
      setTotal(data.count || 0);
      const itens = (data.items||[]).map(it => DJEN.toLexia(it));
      setPublicacoes(itens);
      setUltimaSync(new Date().toISOString());
    } catch(e) {
      setErro(e.message || "Falha ao consultar DJEN/CNJ");
      setPublicacoes([]);
    }
    setLoading(false);
  }, [pagina, filtroEstado]);

  useEffect(()=>{carregar();},[carregar]);

  // filtrar e ordenar
  const filtradas = publicacoes.filter(p => {
    const status = getStatus(p.id);
    if (filtroStatus !== "todas" && status !== filtroStatus) return false;
    if (filtroEstado !== "todos") {
      // tribunal pode ser TJCE, TRF5, etc. — verificar se contém UF
      if (!p.tribunal.includes(filtroEstado) && !p.orgao.includes(filtroEstado)) return false;
    }
    if (busca.trim()) {
      const q = busca.toLowerCase();
      if (!(p.processo.toLowerCase().includes(q) || p.texto.toLowerCase().includes(q) || p.orgao.toLowerCase().includes(q) || p.classe.toLowerCase().includes(q))) return false;
    }
    return true;
  });

  // contadores
  const contNaoTratHoje = publicacoes.filter(p=>getStatus(p.id)==="nao_tratada" && isHoje(p.dataDisponibilizacao)).length;
  const contTratHoje = Object.entries(tratamentos).filter(([id,s])=>s==="tratada").length;
  const contDescartHoje = Object.entries(tratamentos).filter(([id,s])=>s==="descartada").length;
  const contNaoTratTotal = total - Object.values(tratamentos).filter(s=>s!=="nao_tratada").length;

  const StatusBadge = ({status}) => {
    const cfg = {
      nao_tratada: { bg:"rgba(212,175,55,.12)", color:"var(--gold)", border:"rgba(212,175,55,.35)", label:"NÃO TRATADA" },
      tratada: { bg:"rgba(59,130,246,.12)", color:"var(--info)", border:"rgba(59,130,246,.35)", label:"TRATADA" },
      descartada: { bg:"rgba(239,68,68,.10)", color:"var(--danger)", border:"rgba(239,68,68,.30)", label:"DESCARTADA" },
    }[status] || {};
    return <span style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`,fontSize:"0.55rem",padding:"0.15rem 0.5rem",borderRadius:"10px",fontWeight:"600",letterSpacing:"0.05em",whiteSpace:"nowrap"}}>{cfg.label}</span>;
  };

  return (
    <div className="fade-in">
      {/* CABEÇALHO COM 4 MÉTRICAS — INSPIRADO NO ASTREA */}
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"12px",padding:"1rem 1.2rem",marginBottom:"1rem"}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:"1rem",alignItems:"center"}}>
          <div>
            <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--text)",lineHeight:1}}>{contNaoTratHoje}</div>
            <div style={{fontSize:"0.6rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:"0.3rem"}}>Não tratadas de hoje</div>
          </div>
          <div>
            <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--info)",lineHeight:1}}>{contTratHoje}</div>
            <div style={{fontSize:"0.6rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:"0.3rem"}}>Tratadas hoje</div>
          </div>
          <div>
            <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--danger)",lineHeight:1}}>{contDescartHoje}</div>
            <div style={{fontSize:"0.6rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:"0.3rem"}}>Descartadas hoje</div>
          </div>
          <div>
            <div style={{fontSize:"1.6rem",fontWeight:"bold",color:"var(--gold)",lineHeight:1}}>{contNaoTratTotal}</div>
            <div style={{fontSize:"0.6rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:"0.3rem"}}>Não tratadas (total)</div>
          </div>
        </div>
      </div>

      {/* BARRA DE FILTROS */}
      <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.8rem",flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:"1 1 240px",minWidth:"200px",position:"relative"}}>
          <input
            value={busca}
            onChange={e=>setBusca(e.target.value)}
            placeholder="Buscar processo, órgão, classe ou termo no texto..."
            style={{...inputStyle,padding:"0.55rem 0.9rem"}}
          />
        </div>
        <select value={filtroEstado} onChange={e=>{setFiltroEstado(e.target.value);setPagina(1);}} style={{...inputStyle,padding:"0.55rem 0.7rem",width:"auto",flex:"0 0 auto"}}>
          <option value="todos">Todos os estados</option>
          {ESTADOS_BR.map(uf=><option key={uf} value={uf}>{uf}</option>)}
        </select>
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} style={{...inputStyle,padding:"0.55rem 0.7rem",width:"auto",flex:"0 0 auto"}}>
          <option value="todas">Todos status</option>
          <option value="nao_tratada">Não tratadas</option>
          <option value="tratada">Tratadas</option>
          <option value="descartada">Descartadas</option>
        </select>
        <button onClick={carregar} disabled={loading} style={{...btnPrimary,padding:"0.55rem 1rem",fontSize:"0.86rem",opacity:loading?.6:1,display:"flex",alignItems:"center",gap:"0.4rem"}}>
          <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>↻</span>
          {loading?"Carregando...":"Atualizar"}
        </button>
      </div>

      {/* CHIP DE FILTRO ATIVO */}
      {filtroStatus !== "todas" && (
        <div style={{display:"flex",gap:"0.5rem",marginBottom:"0.8rem"}}>
          <span style={{background:"rgba(255,255,255,.05)",color:"var(--text-mid)",fontSize:"0.62rem",padding:"0.25rem 0.7rem",borderRadius:"4px",letterSpacing:"0.06em",textTransform:"uppercase"}}>
            STATUS: {filtroStatus === "nao_tratada" ? "NÃO TRATADA" : filtroStatus.toUpperCase()}
            <button onClick={()=>setFiltroStatus("todas")} style={{background:"none",border:"none",color:"var(--text-dim)",marginLeft:"0.5rem",cursor:"pointer",fontSize:"0.7rem"}}>×</button>
          </span>
        </div>
      )}

      {/* INFO DE TOTAIS */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:"0.85rem",color:"var(--text-dim)",marginBottom:"0.5rem"}}>
        <span>Mostrando {filtradas.length} de {publicacoes.length} (página {pagina}) — {total.toLocaleString("pt-BR")} no total via DJEN</span>
        {ultimaSync && <span style={{fontSize:"0.75rem"}}>Última sync: {new Date(ultimaSync).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>}
      </div>

      {erro && (
        <div style={{background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",color:"var(--danger)",padding:"0.7rem 1rem",borderRadius:"8px",fontSize:"0.86rem",marginBottom:"0.8rem"}}>
          ⚠ {erro}
        </div>
      )}

      {/* LISTA DE PUBLICAÇÕES — formato cards estilo Astrea */}
      {filtradas.length === 0 && !loading ? (
        <div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text-dim)"}}>
          <p style={{fontSize:"0.95rem"}}>Nenhuma publicação encontrada</p>
          <p style={{fontSize:"0.78rem",marginTop:"0.4rem"}}>Tente ajustar filtros ou buscar por outro termo.</p>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"0.5rem"}}>
          {filtradas.map(pub => {
            const status = getStatus(pub.id);
            const aberto = expandido === pub.id;
            const procVinculado = vinculacoes[pub.id];
            return (
              <div key={pub.id} className="fade-in" style={{background:"rgba(255,255,255,.03)",border:`1px solid ${aberto?"rgba(212,175,55,.4)":"var(--border)"}`,borderRadius:"10px",overflow:"hidden",transition:"border-color .2s"}}>
                <div onClick={()=>setExpandido(aberto?null:pub.id)} style={{padding:"0.85rem 1rem",cursor:"pointer",display:"flex",gap:"0.8rem",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    {/* Linha 1: data + tribunal + status */}
                    <div style={{display:"flex",gap:"0.5rem",alignItems:"center",flexWrap:"wrap",marginBottom:"0.3rem"}}>
                      <span style={{fontSize:"0.62rem",color:"var(--gold)",fontFamily:"monospace",fontWeight:"600"}}>{pub.tribunal}</span>
                      <span style={{fontSize:"0.78rem",color:"var(--text-dim)"}}>{pub.dataDisponibilizacaoBR || pub.dataDisponibilizacao}</span>
                      <StatusBadge status={status}/>
                      {pub.tipo && <span style={{fontSize:"0.62rem",background:"rgba(255,255,255,.05)",color:"var(--text-mid)",padding:"0.1rem 0.45rem",borderRadius:"10px"}}>{pub.tipo}</span>}
                      {procVinculado && <span style={{fontSize:"0.62rem",background:"rgba(16,185,129,.1)",color:"var(--success)",padding:"0.1rem 0.45rem",borderRadius:"10px",border:"1px solid rgba(16,185,129,.25)"}}>✓ Vinculada</span>}
                    </div>
                    {/* Linha 2: processo */}
                    <div style={{fontSize:"0.86rem",color:"var(--text)",fontFamily:"monospace",marginBottom:"0.2rem"}}>{pub.processo || "(sem nº)"}</div>
                    {/* Linha 3: órgão */}
                    <div style={{fontSize:"0.78rem",color:"var(--text-dim)",lineHeight:1.4}}>{pub.orgao}</div>
                    {/* Snippet */}
                    {!aberto && pub.texto && <div style={{fontSize:"0.72rem",color:"var(--text-dim)",marginTop:"0.4rem",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{pub.texto.substring(0,140)}…</div>}
                  </div>
                  <span style={{color:"var(--text-dim)",fontSize:"0.8rem",transition:"transform .2s",display:"inline-block",transform:aberto?"rotate(180deg)":"none",flexShrink:0}}>▾</span>
                </div>

                {/* DETALHE EXPANDIDO */}
                {aberto && (
                  <div style={{borderTop:"1px solid var(--border)",padding:"1rem",background:"rgba(0,0,0,.15)"}}>
                    {/* metadados */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"0.5rem 1rem",fontSize:"0.78rem",marginBottom:"0.8rem"}}>
                      <div><strong style={{color:"var(--text-mid)"}}>Tipo:</strong> {pub.tipoDocumento || pub.tipo}</div>
                      <div><strong style={{color:"var(--text-mid)"}}>Classe:</strong> {pub.classe || "—"}</div>
                      <div><strong style={{color:"var(--text-mid)"}}>Meio:</strong> {pub.meio}</div>
                      <div><strong style={{color:"var(--text-mid)"}}>Comunicação nº:</strong> {pub.numeroComunicacao}</div>
                    </div>

                    {/* destinatários */}
                    {pub.destinatarios.length > 0 && (
                      <div style={{fontSize:"0.78rem",marginBottom:"0.5rem"}}>
                        <strong style={{color:"var(--text-mid)"}}>Partes:</strong>
                        <ul style={{margin:"0.2rem 0 0 1.2rem",color:"var(--text-dim)"}}>
                          {pub.destinatarios.slice(0,5).map((d,i)=><li key={i}>{d.nome} {d.polo ? `(${d.polo})` : ""}</li>)}
                        </ul>
                      </div>
                    )}

                    {/* texto integral */}
                    <div style={{background:"rgba(0,0,0,.25)",border:"1px solid var(--border)",borderRadius:"8px",padding:"0.8rem 1rem",fontSize:"0.78rem",lineHeight:1.55,color:"var(--text)",maxHeight:"360px",overflow:"auto",whiteSpace:"pre-wrap",fontFamily:"'Segoe UI',sans-serif"}}>
                      {pub.texto || "(sem texto)"}
                    </div>

                    {/* link inteiro teor */}
                    {pub.link && (
                      <a href={pub.link} target="_blank" rel="noopener noreferrer" style={{display:"inline-block",marginTop:"0.6rem",fontSize:"0.78rem",color:"var(--info)"}}>↗ Inteiro teor no PJe</a>
                    )}

                    {/* AÇÕES */}
                    <div style={{display:"flex",gap:"0.5rem",marginTop:"0.9rem",flexWrap:"wrap",borderTop:"1px solid var(--border)",paddingTop:"0.8rem"}}>
                      <button onClick={()=>setStatus(pub.id,"tratada")} disabled={status==="tratada"} style={{padding:"0.45rem 0.9rem",borderRadius:"8px",background:status==="tratada"?"rgba(59,130,246,.2)":"linear-gradient(135deg,#3b82f6,#1e40af)",color:status==="tratada"?"var(--info)":"#fff",border:"none",fontSize:"0.78rem",fontWeight:"600",cursor:status==="tratada"?"default":"pointer",opacity:status==="tratada"?.6:1}}>
                        ✓ Marcar tratada
                      </button>
                      <button onClick={()=>setStatus(pub.id,"descartada")} disabled={status==="descartada"} style={{padding:"0.45rem 0.9rem",borderRadius:"8px",background:"transparent",color:"var(--danger)",border:"1px solid rgba(239,68,68,.4)",fontSize:"0.78rem",fontWeight:"600",cursor:status==="descartada"?"default":"pointer",opacity:status==="descartada"?.5:1}}>
                        Descartar
                      </button>
                      <button onClick={()=>setStatus(pub.id,"nao_tratada")} disabled={status==="nao_tratada"} style={{padding:"0.45rem 0.9rem",borderRadius:"8px",background:"transparent",color:"var(--text-mid)",border:"1px solid var(--border)",fontSize:"0.78rem",cursor:status==="nao_tratada"?"default":"pointer",opacity:status==="nao_tratada"?.5:1}}>
                        Reverter
                      </button>
                      <button onClick={()=>setVincModal(pub)} style={{padding:"0.45rem 0.9rem",borderRadius:"8px",background:"transparent",color:"var(--gold)",border:"1px solid rgba(212,175,55,.4)",fontSize:"0.78rem",fontWeight:"600",cursor:"pointer",marginLeft:"auto"}}>
                        {procVinculado ? "Trocar processo vinculado" : "Vincular a processo"}
                      </button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* PAGINAÇÃO */}
      {total > itensPorPagina && (
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:"0.8rem",marginTop:"1.2rem"}}>
          <button onClick={()=>setPagina(Math.max(1,pagina-1))} disabled={pagina<=1||loading} style={{...btnSecondary,padding:"0.5rem 1rem",fontSize:"0.85rem",opacity:pagina<=1?.4:1}}>← Anterior</button>
          <span style={{fontSize:"0.85rem",color:"var(--text-dim)"}}>Página {pagina} de {Math.ceil(total/itensPorPagina)}</span>
          <button onClick={()=>setPagina(pagina+1)} disabled={pagina>=Math.ceil(total/itensPorPagina)||loading} style={{...btnSecondary,padding:"0.5rem 1rem",fontSize:"0.85rem",opacity:pagina>=Math.ceil(total/itensPorPagina)?.4:1}}>Próxima →</button>
        </div>
      )}

      {/* MODAL VINCULAR PROCESSO */}
      {vincModal && (
        <Modal title="Vincular publicação a processo" onClose={()=>setVincModal(null)}>
          <p style={{fontSize:"0.85rem",color:"var(--text-mid)",marginBottom:"1rem",lineHeight:1.5}}>
            Para tratar esta publicação, vincule-a a um processo do seu monitoramento. Assim você consegue adicionar prazos e tarefas relacionadas.
          </p>
          <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"8px",padding:"0.6rem 0.8rem",marginBottom:"1rem",fontSize:"0.78rem",color:"var(--text-dim)"}}>
            <div><strong style={{color:"var(--gold)"}}>Publicação:</strong> {vincModal.processo}</div>
            <div><strong style={{color:"var(--gold)"}}>Tribunal:</strong> {vincModal.tribunal} — {vincModal.orgao}</div>
          </div>
          <label style={labelStyle}>Selecionar processo</label>
          <select
            defaultValue={vinculacoes[vincModal.id]||""}
            onChange={e=>{
              const procId = e.target.value;
              setVinculacoes(prev => {
                if (procId) return {...prev, [vincModal.id]: procId};
                const c = {...prev};
                delete c[vincModal.id];
                return c;
              });
            }}
            style={inputStyle}
          >
            <option value="">— nenhum / desvincular —</option>
            {PROCESSOS_CONFIG.map(p => <option key={p.id} value={p.id}>{p.cliente} — {p.numero}</option>)}
          </select>
          <div style={{display:"flex",gap:"0.5rem",justifyContent:"flex-end",marginTop:"1.2rem"}}>
            <button onClick={()=>setVincModal(null)} style={btnSecondary}>Fechar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// Consulta DataJud e compara com histórico salvo para detectar novas movimentações
async function consultarMovimentacoesDatajud() {
  const resultados = [];
  for(const cfg of PROCESSOS_CONFIG) {
    try {
      const resp = await fetch(DATAJUD_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`APIKey ${DATAJUD_KEY}`},
        body:JSON.stringify({query:{term:{numeroProcesso:cfg.numeroDatajud}},size:1}),
      });
      if(resp.ok) {
        const data = await resp.json();
        const source = data?.hits?.hits?.[0]?._source;
        if(source) {
          const movs = (source.movimentos||[]).map(m=>({
            data: m.dataHora||"",
            dataFormatada: m.dataHora ? new Date(m.dataHora).toLocaleDateString("pt-BR") : "—",
            nome: m.nome||"Movimentação",
            complemento: m.complementosTabelados?.map(c=>c.nome||c.descricao).filter(Boolean).join(", ")||"",
            codigo: m.codigo||0,
          }));
          resultados.push({...cfg, movimentos:movs, vara:source.orgaoJulgador?.nome||"—", classe:source.classe?.nome||"—", sucesso:true});
        } else {
          resultados.push({...cfg, movimentos:[], sucesso:false});
        }
      } else {
        resultados.push({...cfg, movimentos:[], sucesso:false});
      }
    } catch(e) {
      resultados.push({...cfg, movimentos:[], sucesso:false});
    }
  }
  return resultados;
}

function AlertasMovimentacao() {
  const [historico, setHistorico] = useState(()=>Storage.get("movHistorico",{}));
  const [novasMovs, setNovasMovs] = useState(()=>Storage.get("novasMovs",[]));
  const [loading, setLoading] = useState(false);
  const [ultimaVerificacao, setUltimaVerificacao] = useState(()=>Storage.get("ultimaVerificacaoMov",null));
  const [autoCheck, setAutoCheck] = useState(()=>Storage.get("autoCheckMov",true));
  const [intervalo, setIntervalo] = useState(()=>Storage.get("intervaloCheckMov",30));
  const [filtroProcesso, setFiltroProcesso] = useState("todos");
  const [expandido, setExpandido] = useState(null);

  // Salvar estado
  useEffect(()=>{Storage.set("movHistorico",historico);},[historico]);
  useEffect(()=>{Storage.set("novasMovs",novasMovs);},[novasMovs]);
  useEffect(()=>{Storage.set("ultimaVerificacaoMov",ultimaVerificacao);},[ultimaVerificacao]);
  useEffect(()=>{Storage.set("autoCheckMov",autoCheck);},[autoCheck]);
  useEffect(()=>{Storage.set("intervaloCheckMov",intervalo);},[intervalo]);

  const verificar = useCallback(async () => {
    setLoading(true);
    try {
      const resultados = await consultarMovimentacoesDatajud();
      const novas = [];
      const novoHistorico = {...historico};

      resultados.forEach(proc => {
        if(!proc.sucesso || proc.movimentos.length===0) return;
        const chave = proc.numeroDatajud;
        const anteriores = novoHistorico[chave]||[];
        const anterioresSet = new Set(anteriores.map(m=>`${m.data}_${m.nome}_${m.codigo}`));

        proc.movimentos.forEach(mov => {
          const key = `${mov.data}_${mov.nome}_${mov.codigo}`;
          if(!anterioresSet.has(key) && anteriores.length > 0) {
            novas.push({
              id: genId(),
              processoId: proc.id,
              cliente: proc.cliente,
              numero: proc.numero,
              vara: proc.vara,
              movimentacao: mov.nome,
              complemento: mov.complemento,
              dataMov: mov.dataFormatada,
              dataDetectada: new Date().toISOString(),
              lida: false,
            });
          }
        });

        novoHistorico[chave] = proc.movimentos.map(m=>({data:m.data,nome:m.nome,codigo:m.codigo}));
      });

      setHistorico(novoHistorico);
      if(novas.length > 0) {
        setNovasMovs(prev=>[...novas,...prev].slice(0,100));
      }
      setUltimaVerificacao(new Date().toISOString());

      // Notificação do navegador
      if(novas.length > 0 && "Notification" in window && Notification.permission === "granted") {
        new Notification(`Lexia — ${novas.length} nova(s) movimentação(ões)`, {
          body: novas.slice(0,3).map(n=>`${n.cliente}: ${n.movimentacao}`).join("\n"),
          icon: "⚖️",
        });
      }
    } catch(e) {
      console.error("Erro ao verificar movimentações:", e);
    }
    setLoading(false);
  }, [historico]);

  // Auto-check periódico
  useEffect(()=>{
    if(!autoCheck) return;
    const timer = setInterval(()=>{verificar();}, intervalo*60*1000);
    return ()=>clearInterval(timer);
  },[autoCheck, intervalo, verificar]);

  // Solicitar permissão de notificação
  const pedirPermissaoNotificacao = () => {
    if("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
  };

  const marcarLida = (id) => {
    setNovasMovs(prev=>prev.map(m=>m.id===id?{...m,lida:true}:m));
  };
  const marcarTodasLidas = () => {
    setNovasMovs(prev=>prev.map(m=>({...m,lida:true})));
  };
  const limparHistorico = () => {
    if(confirm("Limpar todas as notificações de movimentação?")) {
      setNovasMovs([]);
    }
  };

  const naoLidas = novasMovs.filter(m=>!m.lida).length;
  const filtradas = novasMovs.filter(m=>{
    if(filtroProcesso==="todos") return true;
    return m.processoId===filtroProcesso;
  });

  const temNotificacaoBrowser = "Notification" in window;
  const permissaoNotificacao = temNotificacaoBrowser ? Notification.permission : "denied";

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem"}}>Alertas de Movimentação</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>
            Monitoramento automático via DataJud/CNJ
            {ultimaVerificacao && ` · Última verificação: ${new Date(ultimaVerificacao).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}`}
          </p>
        </div>
        <button onClick={verificar} disabled={loading} style={{...btnPrimary,opacity:loading?.6:1,display:"flex",alignItems:"center",gap:"0.4rem"}}>
          <span style={{display:"inline-block",animation:loading?"spin 1s linear infinite":"none"}}>↻</span>
          {loading?"Verificando...":"Verificar Agora"}
        </button>
      </div>

      {/* Painel de controle */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:"0.6rem",marginBottom:"1rem"}}>
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Não lidas</div>
          <div style={{fontSize:"1.4rem",color:naoLidas?"var(--gold)":"var(--text-dim)",fontWeight:"bold",marginTop:"0.2rem"}}>{naoLidas}</div>
        </div>
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Total registradas</div>
          <div style={{fontSize:"1.4rem",color:"var(--info)",fontWeight:"bold",marginTop:"0.2rem"}}>{novasMovs.length}</div>
        </div>
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Processos monitorados</div>
          <div style={{fontSize:"1.4rem",color:"var(--success)",fontWeight:"bold",marginTop:"0.2rem"}}>{PROCESSOS_CONFIG.length}</div>
        </div>
      </div>

      {/* Configurações de monitoramento */}
      <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"0.8rem 1rem",marginBottom:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"0.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.8rem",flexWrap:"wrap"}}>
            <label style={{display:"flex",alignItems:"center",gap:"0.4rem",fontSize:"0.84rem",color:"var(--text-mid)",cursor:"pointer"}}>
              <input type="checkbox" checked={autoCheck} onChange={e=>setAutoCheck(e.target.checked)} style={{accentColor:"var(--gold)"}}/>
              Verificação automática
            </label>
            {autoCheck&&(
              <select value={intervalo} onChange={e=>setIntervalo(parseInt(e.target.value))} style={{...inputStyle,width:"auto",padding:"0.3rem 0.5rem",fontSize:"0.82rem"}}>
                <option value="15">A cada 15 min</option>
                <option value="30">A cada 30 min</option>
                <option value="60">A cada 1 hora</option>
                <option value="120">A cada 2 horas</option>
              </select>
            )}
          </div>
          <div style={{display:"flex",gap:"0.3rem"}}>
            {temNotificacaoBrowser&&permissaoNotificacao!=="granted"&&(
              <button onClick={pedirPermissaoNotificacao} style={{...btnSecondary,fontSize:"0.78rem",padding:"0.3rem 0.6rem"}}>Ativar notificações</button>
            )}
            {temNotificacaoBrowser&&permissaoNotificacao==="granted"&&(
              <span style={{fontSize:"0.72rem",color:"var(--success)",display:"flex",alignItems:"center",gap:"0.2rem"}}>● Notificações ativas</span>
            )}
          </div>
        </div>
      </div>

      {/* Info inicial se não há histórico */}
      {Object.keys(historico).length===0&&(
        <div style={{background:"var(--gold-bg)",border:"1px solid rgba(212,175,55,.18)",borderRadius:"10px",padding:"0.8rem 1rem",marginBottom:"1rem",fontSize:"0.78rem",color:"var(--text-mid)"}}>
          ℹ️ <strong>Primeira execução:</strong> Clique em "Verificar Agora" para criar a linha de base. A partir da segunda verificação, novas movimentações serão detectadas e exibidas aqui automaticamente.
        </div>
      )}

      {/* Ações em lote */}
      {novasMovs.length>0&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.8rem",flexWrap:"wrap",gap:"0.5rem"}}>
          <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap"}}>
            <button onClick={()=>setFiltroProcesso("todos")} style={{padding:"0.3rem 0.6rem",borderRadius:"16px",border:`1px solid ${filtroProcesso==="todos"?"rgba(212,175,55,.4)":"var(--border)"}`,background:filtroProcesso==="todos"?"var(--gold-bg)":"transparent",color:filtroProcesso==="todos"?"var(--gold)":"var(--text-dim)",fontSize:"0.78rem",cursor:"pointer"}}>Todos</button>
            {PROCESSOS_CONFIG.map(p=>{
              const count = novasMovs.filter(m=>m.processoId===p.id).length;
              if(count===0) return null;
              return <button key={p.id} onClick={()=>setFiltroProcesso(p.id)} style={{padding:"0.3rem 0.6rem",borderRadius:"16px",border:`1px solid ${filtroProcesso===p.id?"rgba(212,175,55,.4)":"var(--border)"}`,background:filtroProcesso===p.id?"var(--gold-bg)":"transparent",color:filtroProcesso===p.id?"var(--gold)":"var(--text-dim)",fontSize:"0.78rem",cursor:"pointer"}}>{p.cliente} ({count})</button>;
            })}
          </div>
          <div style={{display:"flex",gap:"0.3rem"}}>
            {naoLidas>0&&<button onClick={marcarTodasLidas} style={{...btnSecondary,fontSize:"0.76rem",padding:"0.3rem 0.6rem"}}>Marcar todas como lidas</button>}
            <button onClick={limparHistorico} style={{...btnSecondary,fontSize:"0.76rem",padding:"0.3rem 0.6rem",color:"var(--danger)",borderColor:"rgba(239,68,68,.3)"}}>Limpar</button>
          </div>
        </div>
      )}

      {/* Timeline de movimentações */}
      {filtradas.length===0 ? (
        <div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text-dim)"}}>
          <div style={{fontSize:"2rem",marginBottom:"0.5rem"}}>📡</div>
          <p style={{fontSize:"0.88rem"}}>{Object.keys(historico).length===0?"Nenhuma verificação realizada ainda":"Nenhuma nova movimentação detectada"}</p>
          <p style={{fontSize:"0.84rem",marginTop:"0.3rem",color:"var(--text-dim)"}}>O sistema compara automaticamente com a última verificação</p>
        </div>
      ) : (
        <div style={{position:"relative",paddingLeft:"1.5rem"}}>
          {/* Linha vertical da timeline */}
          <div style={{position:"absolute",left:"0.45rem",top:"0.5rem",bottom:"0.5rem",width:"2px",background:"var(--border)"}}/>

          {filtradas.map((mov,i)=>(
            <div key={mov.id} className="fade-in" style={{position:"relative",marginBottom:"0.6rem"}}>
              {/* Dot da timeline */}
              <div style={{position:"absolute",left:"-1.25rem",top:"0.9rem",width:"10px",height:"10px",borderRadius:"50%",background:mov.lida?"var(--text-dim)":"var(--gold)",border:`2px solid ${mov.lida?"var(--navy-mid)":"rgba(212,175,55,.4)"}`,zIndex:1}}/>

              <div onClick={()=>{setExpandido(expandido===i?null:i);if(!mov.lida)marcarLida(mov.id);}} style={{background:mov.lida?"rgba(255,255,255,.02)":"rgba(212,175,55,.04)",border:`1px solid ${mov.lida?"var(--border)":"rgba(212,175,55,.2)"}`,borderRadius:"10px",padding:"0.8rem 1rem",cursor:"pointer",transition:"all .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"0.5rem"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
                      {!mov.lida&&<span style={{width:"6px",height:"6px",borderRadius:"50%",background:"var(--gold)",flexShrink:0}}/>}
                      <span style={{fontSize:"0.88rem",fontWeight:mov.lida?"400":"600",color:mov.lida?"var(--text-mid)":"var(--text)"}}>{mov.movimentacao}</span>
                    </div>
                    <div style={{fontSize:"0.82rem",color:"var(--text-dim)",marginTop:"0.15rem"}}>{mov.cliente} — {mov.numero}</div>
                    {expandido===i&&(
                      <div style={{marginTop:"0.5rem",fontSize:"0.82rem",color:"var(--text-mid)",lineHeight:1.6}}>
                        {mov.vara&&<div>⚖️ {mov.vara}</div>}
                        {mov.complemento&&<div>📋 {mov.complemento}</div>}
                        <div style={{color:"var(--text-dim)",marginTop:"0.3rem",fontSize:"0.76rem"}}>Detectada em: {new Date(mov.dataDetectada).toLocaleString("pt-BR")}</div>
                      </div>
                    )}
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:"0.78rem",color:"var(--gold)"}}>{mov.dataMov}</div>
                    <span style={{color:"var(--text-dim)",fontSize:"0.7rem",transition:"transform .2s",display:"inline-block",transform:expandido===i?"rotate(180deg)":"none"}}>▾</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// GESTÃO DE TAREFAS
// ═══════════════════════════════════════════════════════════════════════════════
function GestaoTarefas() {
  const [tarefas, setTarefas] = useState(()=>Storage.get("tarefas",[]));
  const [modal, setModal] = useState(null);
  const [filtro, setFiltro] = useState("todas");
  const [importMsg, setImportMsg] = useState(null);

  useEffect(()=>{Storage.set("tarefas",tarefas);},[tarefas]);

  const salvar = (t) => {
    if(t.id) { setTarefas(prev=>prev.map(x=>x.id===t.id?t:x)); }
    else { setTarefas(prev=>[{...t,id:genId(),criadoEm:new Date().toISOString()},...prev]); }
    setModal(null);
  };
  const excluir = (id) => { setTarefas(prev=>prev.filter(x=>x.id!==id)); setModal(null); };

  // ─── Importar tarefas do Astrea (lê tarefas-astrea.json no mesmo diretório) ───
  const importarAstrea = async () => {
    setImportMsg({tipo:"info",texto:"Buscando tarefas-astrea.json..."});
    try {
      const resp = await fetch("./tarefas-astrea.json", {cache:"no-store"});
      if (!resp.ok) throw new Error(`Arquivo não encontrado (HTTP ${resp.status})`);
      const data = await resp.json();
      const lista = Array.isArray(data) ? data : (data.tarefas || []);
      if (!lista.length) throw new Error("Arquivo sem tarefas.");
      // dedup por título já existente E origemAstrea
      const titulosExistentes = new Set(tarefas.filter(t=>t.origemAstrea).map(t=>t.titulo));
      const novas = lista
        .filter(t => !titulosExistentes.has(t.titulo))
        .map(t => ({
          id: genId(),
          criadoEm: new Date().toISOString(),
          titulo: t.titulo || "(sem título)",
          descricao: t.descricao || "",
          prazo: t.prazo || "",
          prioridade: t.prioridade || "media",
          status: t.status || "pendente",
          processoId: t.processoId || "",
          origemAstrea: true,
        }));
      if (novas.length === 0) {
        setImportMsg({tipo:"warn",texto:"Todas as tarefas do Astrea já foram importadas anteriormente."});
        return;
      }
      setTarefas(prev => [...novas, ...prev]);
      setImportMsg({tipo:"ok",texto:`✓ ${novas.length} tarefa(s) importada(s) do Astrea.`});
    } catch(e) {
      setImportMsg({tipo:"err",texto:`Falha: ${e.message}`});
    }
  };
  const toggleStatus = (id) => {
    setTarefas(prev=>prev.map(x=>{
      if(x.id!==id) return x;
      const next = x.status==="pendente"?"em_andamento":x.status==="em_andamento"?"concluida":"pendente";
      return {...x,status:next,concluidaEm:next==="concluida"?new Date().toISOString():null};
    }));
  };

  const filtradas = tarefas.filter(t=>{
    if(filtro==="todas") return true;
    if(filtro==="pendente") return t.status==="pendente";
    if(filtro==="em_andamento") return t.status==="em_andamento";
    if(filtro==="concluida") return t.status==="concluida";
    if(filtro==="vencidas") return t.status!=="concluida"&&isOverdue(t.prazo);
    return true;
  }).sort((a,b)=>{
    if(a.status==="concluida"&&b.status!=="concluida") return 1;
    if(b.status==="concluida"&&a.status!=="concluida") return -1;
    if(a.prioridade==="alta"&&b.prioridade!=="alta") return -1;
    if(!a.prazo) return 1; if(!b.prazo) return -1;
    return new Date(a.prazo)-new Date(b.prazo);
  });

  const vencidas = tarefas.filter(t=>t.status!=="concluida"&&isOverdue(t.prazo)).length;

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem"}}>Gestão de Tarefas</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>{tarefas.filter(t=>t.status!=="concluida").length} pendentes {vencidas>0&&<span style={{color:"var(--danger)"}}>· {vencidas} vencidas</span>}</p>
        </div>
        <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap"}}>
          <button onClick={importarAstrea} style={{...btnSecondary,display:"flex",alignItems:"center",gap:"0.3rem",fontSize:"0.85rem"}} title="Importa tarefas exportadas do Astrea (arquivo tarefas-astrea.json)">
            ⤓ Importar do Astrea
          </button>
          <button onClick={()=>setModal({status:"pendente",prioridade:"media",titulo:"",descricao:"",prazo:"",processoId:""})} style={{...btnPrimary,display:"flex",alignItems:"center",gap:"0.3rem"}}>{Icons.plus} Nova Tarefa</button>
        </div>
      </div>

      {/* Mensagem de feedback de importação */}
      {importMsg && (
        <div style={{
          background: importMsg.tipo==="ok"?"rgba(16,185,129,.08)":importMsg.tipo==="err"?"rgba(239,68,68,.08)":importMsg.tipo==="warn"?"rgba(245,158,11,.08)":"var(--gold-bg)",
          border: `1px solid ${importMsg.tipo==="ok"?"rgba(16,185,129,.3)":importMsg.tipo==="err"?"rgba(239,68,68,.3)":importMsg.tipo==="warn"?"rgba(245,158,11,.3)":"rgba(212,175,55,.25)"}`,
          color: importMsg.tipo==="ok"?"var(--success)":importMsg.tipo==="err"?"var(--danger)":importMsg.tipo==="warn"?"var(--warning)":"var(--gold)",
          padding:"0.6rem 0.9rem",borderRadius:"8px",fontSize:"0.85rem",marginBottom:"0.8rem",display:"flex",justifyContent:"space-between",alignItems:"center"
        }}>
          <span>{importMsg.texto}</span>
          <button onClick={()=>setImportMsg(null)} style={{background:"none",border:"none",color:"inherit",cursor:"pointer",fontSize:"1rem",lineHeight:1}}>×</button>
        </div>
      )}

      <div style={{display:"flex",gap:"0.4rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        {[{k:"todas",l:"Todas"},{k:"pendente",l:"Pendentes"},{k:"em_andamento",l:"Em andamento"},{k:"concluida",l:"Concluídas"},{k:"vencidas",l:"Vencidas"}].map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)} style={{padding:"0.35rem 0.7rem",borderRadius:"20px",border:`1px solid ${filtro===f.k?"rgba(212,175,55,.4)":"var(--border)"}`,background:filtro===f.k?"var(--gold-bg)":"transparent",color:filtro===f.k?"var(--gold)":"var(--text-dim)",fontSize:"0.86rem",cursor:"pointer"}}>{f.l}{f.k==="vencidas"&&vencidas>0?` (${vencidas})`:""}</button>
        ))}
      </div>

      {filtradas.length===0 ? (
        <div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text-dim)"}}>
          <p style={{fontSize:"0.85rem"}}>Nenhuma tarefa {filtro!=="todas"?`com filtro "${filtro}"`:""}</p>
          <p style={{fontSize:"0.88rem",marginTop:"0.3rem"}}>Clique em "Nova Tarefa" para começar</p>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
          {filtradas.map(t=>{
            const vencida = t.status!=="concluida"&&isOverdue(t.prazo);
            const hoje = isToday(t.prazo);
            return (
              <div key={t.id} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${vencida?"rgba(239,68,68,.3)":"var(--border)"}`,borderRadius:"10px",padding:"0.8rem 1rem",display:"flex",alignItems:"flex-start",gap:"0.7rem"}}>
                <button onClick={()=>toggleStatus(t.id)} style={{marginTop:"0.1rem",width:"20px",height:"20px",borderRadius:"50%",border:`2px solid ${t.status==="concluida"?"var(--success)":t.status==="em_andamento"?"var(--gold)":"var(--text-dim)"}`,background:t.status==="concluida"?"var(--success)":"transparent",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>
                  {t.status==="concluida"&&<span style={{color:"#fff",fontSize:"0.95rem"}}>✓</span>}
                  {t.status==="em_andamento"&&<span style={{color:"var(--gold)",fontSize:"0.5rem"}}>●</span>}
                </button>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",gap:"0.4rem",alignItems:"center",flexWrap:"wrap"}}>
                    <span style={{fontSize:"0.85rem",color:t.status==="concluida"?"var(--text-dim)":"var(--text)",textDecoration:t.status==="concluida"?"line-through":"none"}}>{t.titulo}</span>
                    {t.prioridade==="alta"&&<span style={{fontSize:"0.55rem",background:"rgba(239,68,68,.1)",color:"var(--danger)",padding:"0.08rem 0.4rem",borderRadius:"10px",border:"1px solid rgba(239,68,68,.25)"}}>ALTA</span>}
                  </div>
                  {t.descricao&&<p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>{t.descricao}</p>}
                  <div style={{display:"flex",gap:"0.6rem",marginTop:"0.3rem",flexWrap:"wrap"}}>
                    {t.prazo&&<span style={{fontSize:"0.64rem",color:vencida?"var(--danger)":hoje?"var(--warning)":"var(--text-dim)"}}>📅 {formatDate(t.prazo)} {vencida?"(VENCIDA)":hoje?"(HOJE)":""}</span>}
                    {t.processoId&&<span style={{fontSize:"0.64rem",color:"var(--info)"}}>{Icons.processos} {PROCESSOS_CONFIG.find(p=>p.id===t.processoId)?.cliente||""}</span>}
                  </div>
                </div>
                <button onClick={()=>setModal(t)} style={{background:"none",border:"none",color:"var(--text-dim)",padding:"4px",cursor:"pointer"}}>{Icons.edit}</button>
              </div>
            );
          })}
        </div>
      )}

      {modal&&(
        <TarefaModal tarefa={modal} onSave={salvar} onDelete={modal.id?()=>excluir(modal.id):null} onClose={()=>setModal(null)}/>
      )}
    </div>
  );
}

function TarefaModal({ tarefa, onSave, onDelete, onClose }) {
  const [form, setForm] = useState(tarefa);
  const upd = (k,v) => setForm(p=>({...p,[k]:v}));
  return (
    <Modal title={form.id?"Editar Tarefa":"Nova Tarefa"} onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
        <div><label style={labelStyle}>Título *</label><input value={form.titulo||""} onChange={e=>upd("titulo",e.target.value)} style={inputStyle} placeholder="Ex: Protocolar contestação"/></div>
        <div><label style={labelStyle}>Descrição</label><textarea value={form.descricao||""} onChange={e=>upd("descricao",e.target.value)} style={{...inputStyle,minHeight:"60px",resize:"vertical"}} placeholder="Detalhes opcionais"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem"}}>
          <div><label style={labelStyle}>Prazo</label><input type="date" value={form.prazo||""} onChange={e=>upd("prazo",e.target.value)} style={inputStyle}/></div>
          <div><label style={labelStyle}>Prioridade</label><select value={form.prioridade||"media"} onChange={e=>upd("prioridade",e.target.value)} style={inputStyle}><option value="baixa">Baixa</option><option value="media">Média</option><option value="alta">Alta</option></select></div>
        </div>
        <div><label style={labelStyle}>Processo vinculado</label><select value={form.processoId||""} onChange={e=>upd("processoId",e.target.value)} style={inputStyle}><option value="">Nenhum</option>{PROCESSOS_CONFIG.map(p=><option key={p.id} value={p.id}>{p.cliente} — {p.numero}</option>)}</select></div>
        <div style={{display:"flex",gap:"0.6rem",justifyContent:"flex-end",marginTop:"0.5rem"}}>
          {onDelete&&<button onClick={onDelete} style={{...btnSecondary,color:"var(--danger)",borderColor:"rgba(239,68,68,.3)",marginRight:"auto"}}>Excluir</button>}
          <button onClick={onClose} style={btnSecondary}>Cancelar</button>
          <button onClick={()=>form.titulo&&onSave(form)} style={{...btnPrimary,opacity:form.titulo?1:.5}}>Salvar</button>
        </div>
      </div>
    </Modal>
  );
}

function MensagemModal({ tipo, cobranca, onClose, gerarWhatsApp, gerarEmail }) {
  const msg = tipo==="whatsapp" ? gerarWhatsApp(cobranca) : gerarEmail(cobranca);
  const [enviandoApi, setEnviandoApi] = useState(false);
  const tokenWA = WaTidy.getToken();
  const copiar = () => { navigator.clipboard.writeText(msg); alert("Mensagem copiada!"); };
  const enviarWhatsApp = () => {
    const tel = (cobranca.telefone||"").replace(/\D/g,"");
    if(tel) window.open(`https://wa.me/55${tel}?text=${encodeURIComponent(msg)}`,"_blank");
    else alert("Telefone não cadastrado para este cliente.");
  };
  const enviarViaApi = async () => {
    if (!cobranca.telefone) return alert("Telefone não cadastrado para este cliente.");
    if (!tokenWA) return alert("Token waTidy não configurado em Configurações → WhatsApp.");
    setEnviandoApi(true);
    try {
      await WaTidy.enviarTexto(cobranca.telefone, msg);
      const hist = Storage.get("wa_historico",[]);
      hist.unshift({id:genId(),tipo:"texto",phone:WaTidy.formatPhone(cobranca.telefone),preview:msg.slice(0,180),status:"enviado",timestamp:new Date().toISOString()});
      Storage.set("wa_historico", hist.slice(0,80));
      alert("✅ Cobrança enviada via WhatsApp!");
      onClose();
    } catch(e) {
      alert(`❌ Erro: ${e.message}`);
    } finally { setEnviandoApi(false); }
  };
  const enviarEmail = () => {
    const email = cobranca.email||"";
    if(email) window.open(`mailto:${email}?subject=${encodeURIComponent("Lembrete de Pagamento — Honorários")}&body=${encodeURIComponent(msg)}`,"_blank");
    else alert("Email não cadastrado para este cliente.");
  };

  return (
    <Modal title={tipo==="whatsapp"?"Lembrete via WhatsApp":"Lembrete via Email"} onClose={onClose} width="560px">
      <div style={{background:"rgba(255,255,255,.03)",borderRadius:"8px",padding:"0.8rem",marginBottom:"1rem",border:"1px solid var(--border)"}}>
        <pre style={{fontSize:"0.9rem",color:"var(--text-mid)",whiteSpace:"pre-wrap",lineHeight:1.65,fontFamily:"inherit"}}>{msg}</pre>
      </div>
      <div style={{display:"flex",gap:"0.5rem",flexWrap:"wrap"}}>
        <button onClick={copiar} style={btnSecondary}>Copiar</button>
        {tipo==="whatsapp" ? (
          <>
            {tokenWA && <button onClick={enviarViaApi} disabled={enviandoApi} style={{...btnPrimary,background:"linear-gradient(135deg,#25d366,#128c7e)",opacity:enviandoApi?0.5:1}}>{enviandoApi?"Enviando...":"Enviar pelo Lexia"}</button>}
            <button onClick={enviarWhatsApp} style={tokenWA?btnSecondary:{...btnPrimary,background:"linear-gradient(135deg,#25d366,#128c7e)"}}>Abrir WhatsApp</button>
          </>
        ) : (
          <button onClick={enviarEmail} style={{...btnPrimary,background:"linear-gradient(135deg,var(--info),#1d4ed8)"}}>Abrir Email</button>
        )}
      </div>
    </Modal>
  );
}
