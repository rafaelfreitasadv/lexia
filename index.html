// Feriados Nacionais (fixos + móveis calculados)
function getFeriadosNacionais(ano) {
  const fixos = [
    [1,1],[4,21],[5,1],[9,7],[10,12],[11,2],[11,15],[12,25]
  ];
  // Páscoa (algoritmo de Meeus)
  const a=ano%19, b=Math.floor(ano/100), c=ano%100;
  const d=Math.floor(b/4), e=b%4, f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3), h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4), k=c%4, l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mesPascoa=Math.floor((h+l-7*m+114)/31);
  const diaPascoa=((h+l-7*m+114)%31)+1;
  const pascoa = new Date(ano, mesPascoa-1, diaPascoa);
  // Carnaval: 47 dias antes da Páscoa
  const carnaval = new Date(pascoa); carnaval.setDate(carnaval.getDate()-47);
  const carnaval2 = new Date(carnaval); carnaval2.setDate(carnaval2.getDate()-1);
  // Sexta-feira Santa: 2 dias antes da Páscoa
  const sextaSanta = new Date(pascoa); sextaSanta.setDate(sextaSanta.getDate()-2);
  // Corpus Christi: 60 dias após a Páscoa
  const corpusChristi = new Date(pascoa); corpusChristi.setDate(corpusChristi.getDate()+60);

  const feriados = fixos.map(([m,d])=>new Date(ano,m-1,d));
  feriados.push(carnaval, carnaval2, sextaSanta, corpusChristi);
  return feriados;
}

// Feriados Estaduais do Ceará
function getFeriadosCeara(ano) {
  return [
    new Date(ano, 2, 19),  // 19 de março - São José (padroeiro do CE)
    new Date(ano, 2, 25),  // 25 de março - Data Magna do Ceará (abolição)
    new Date(ano, 7, 15),  // 15 de agosto - Nossa Senhora da Assunção (Fortaleza)
  ];
}

// Suspensões e recessos forenses TJCE (art. 220 CPC + Res. TJCE)
function getSuspensoesForenses(ano) {
  const suspensoes = [];
  // Recesso forense: 20/dez a 20/jan
  for(let d=20; d<=31; d++) suspensoes.push(new Date(ano, 11, d));
  for(let d=1; d<=20; d++) suspensoes.push(new Date(ano, 0, d));
  // Semana Santa forense (seg a sex da semana santa) - simplificado: qui+sex antes da Páscoa
  return suspensoes;
}

function isWeekend(date) {
  const day = date.getDay();
  return day === 0 || day === 6;
}

function isFeriadoOuSuspensao(date, feriadosCache) {
  const key = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  return feriadosCache.has(key);
}

function buildFeriadosCache(ano) {
  const cache = new Set();
  const anos = [ano-1, ano, ano+1];
  anos.forEach(a => {
    const todos = [...getFeriadosNacionais(a), ...getFeriadosCeara(a), ...getSuspensoesForenses(a)];
    todos.forEach(d => {
      cache.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    });
  });
  return cache;
}

// Contagem de prazo em dias úteis (art. 219 CPC)
// Exclui dia do início, conta a partir do próximo dia útil
function calcularVencimentoPrazo(dataInicio, diasUteis, feriadosCache) {
  let current = new Date(dataInicio);
  current.setDate(current.getDate() + 1); // exclui o dia do início

  // Primeiro dia útil subsequente (art. 224 §2º)
  while(isWeekend(current) || isFeriadoOuSuspensao(current, feriadosCache)) {
    current.setDate(current.getDate() + 1);
  }

  let contados = 1;
  while(contados < diasUteis) {
    current.setDate(current.getDate() + 1);
    if(!isWeekend(current) && !isFeriadoOuSuspensao(current, feriadosCache)) {
      contados++;
    }
  }

  // Se vencimento cai em dia não útil, prorroga (art. 224 §1º)
  while(isWeekend(current) || isFeriadoOuSuspensao(current, feriadosCache)) {
    current.setDate(current.getDate() + 1);
  }

  return current;
}

// Conta dias úteis restantes até uma data
function diasUteisAte(dataAlvo, feriadosCache) {
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const alvo = new Date(dataAlvo); alvo.setHours(0,0,0,0);
  if(alvo <= hoje) return -diasUteisEntre(alvo, hoje, feriadosCache);
  return diasUteisEntre(hoje, alvo, feriadosCache);
}

function diasUteisEntre(de, ate, feriadosCache) {
  let count = 0;
  let current = new Date(de);
  current.setDate(current.getDate() + 1);
  const fim = new Date(ate);
  while(current <= fim) {
    if(!isWeekend(current) && !isFeriadoOuSuspensao(current, feriadosCache)) count++;
    current.setDate(current.getDate() + 1);
  }
  return count;
}

// Prazos comuns do CPC
const PRAZOS_CPC = [
  { nome:"Contestação (art. 335)", dias:15 },
  { nome:"Réplica (art. 351)", dias:15 },
  { nome:"Recurso - Apelação (art. 1003)", dias:15 },
  { nome:"Recurso - Agravo de Instrumento (art. 1003)", dias:15 },
  { nome:"Recurso - Embargos de Declaração (art. 1023)", dias:5 },
  { nome:"Recurso - Recurso Especial (art. 1029)", dias:15 },
  { nome:"Recurso - Recurso Extraordinário (art. 1029)", dias:15 },
  { nome:"Manifestação genérica (art. 218 §3º)", dias:5 },
  { nome:"Impugnação ao cumprimento (art. 525)", dias:15 },
  { nome:"Embargos à execução (art. 915)", dias:15 },
  { nome:"Contrarrazões (art. 1010 §1º)", dias:15 },
  { nome:"Alegações finais (art. 364)", dias:15 },
  { nome:"Cumprimento voluntário (art. 523)", dias:15 },
  { nome:"Personalizado", dias:0 },
];

function GestaoPrazos() {
  const [prazos, setPrazos] = useState(()=>Storage.get("prazos",[]));
  const [modal, setModal] = useState(null);
  const [filtro, setFiltro] = useState("ativos");
  const [calculadora, setCalculadora] = useState(false);

  const feriadosCache = useMemo(()=>buildFeriadosCache(new Date().getFullYear()), []);

  useEffect(()=>{Storage.set("prazos",prazos);},[prazos]);

  const salvar = (p) => {
    if(p.id) { setPrazos(prev=>prev.map(x=>x.id===p.id?p:x)); }
    else { setPrazos(prev=>[{...p,id:genId(),criadoEm:new Date().toISOString()},...prev]); }
    setModal(null);
  };
  const excluir = (id) => { setPrazos(prev=>prev.filter(x=>x.id!==id)); setModal(null); };
  const marcarCumprido = (id) => { setPrazos(prev=>prev.map(x=>x.id===id?{...x,status:"cumprido",cumpridoEm:new Date().toISOString()}:x)); };

  const filtrados = prazos.filter(p=>{
    if(filtro==="ativos") return p.status!=="cumprido";
    if(filtro==="cumpridos") return p.status==="cumprido";
    if(filtro==="vencidos") return p.status!=="cumprido" && diasUteisAte(p.vencimento, feriadosCache) < 0;
    if(filtro==="urgentes") return p.status!=="cumprido" && diasUteisAte(p.vencimento, feriadosCache) >= 0 && diasUteisAte(p.vencimento, feriadosCache) <= 3;
    return true;
  }).sort((a,b)=>{
    if(a.status==="cumprido"&&b.status!=="cumprido") return 1;
    if(b.status==="cumprido"&&a.status!=="cumprido") return -1;
    return new Date(a.vencimento)-new Date(b.vencimento);
  });

  const vencidos = prazos.filter(p=>p.status!=="cumprido" && diasUteisAte(p.vencimento, feriadosCache) < 0).length;
  const urgentes = prazos.filter(p=>p.status!=="cumprido" && diasUteisAte(p.vencimento, feriadosCache) >= 0 && diasUteisAte(p.vencimento, feriadosCache) <= 3).length;
  const ativos = prazos.filter(p=>p.status!=="cumprido").length;

  const getStatusPrazo = (p) => {
    if(p.status==="cumprido") return {label:"CUMPRIDO",cor:"var(--success)",bg:"rgba(16,185,129,.1)"};
    const dias = diasUteisAte(p.vencimento, feriadosCache);
    if(dias < 0) return {label:`VENCIDO (${Math.abs(dias)}d úteis)`,cor:"var(--danger)",bg:"rgba(239,68,68,.1)"};
    if(dias === 0) return {label:"VENCE HOJE",cor:"var(--danger)",bg:"rgba(239,68,68,.1)"};
    if(dias <= 2) return {label:`${dias}d útil(eis)`,cor:"var(--danger)",bg:"rgba(239,68,68,.06)"};
    if(dias <= 5) return {label:`${dias}d úteis`,cor:"var(--warning)",bg:"rgba(245,158,11,.08)"};
    return {label:`${dias}d úteis`,cor:"var(--success)",bg:"rgba(16,185,129,.06)"};
  };

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem"}}>Gestão de Prazos</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>Contagem em dias úteis · CPC arts. 219, 224</p>
        </div>
        <div style={{display:"flex",gap:"0.4rem",flexWrap:"wrap"}}>
          <button onClick={()=>setCalculadora(true)} style={{...btnSecondary,display:"flex",alignItems:"center",gap:"0.3rem",fontSize:"0.84rem"}}>🧮 Calculadora</button>
          <button onClick={()=>setModal({status:"ativo",tipo:"",diasPrazo:15,dataIntimacao:"",vencimento:"",processoId:"",observacao:""})} style={{...btnPrimary,display:"flex",alignItems:"center",gap:"0.3rem"}}>{Icons.plus} Novo Prazo</button>
        </div>
      </div>

      {/* Resumo */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:"0.6rem",marginBottom:"1rem"}}>
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Ativos</div>
          <div style={{fontSize:"1.4rem",color:"var(--info)",fontWeight:"bold",marginTop:"0.2rem"}}>{ativos}</div>
        </div>
        <div style={{background:urgentes?"rgba(245,158,11,.06)":"rgba(255,255,255,.03)",border:`1px solid ${urgentes?"rgba(245,158,11,.25)":"var(--border)"}`,borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:urgentes?"var(--warning)":"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Urgentes (≤3d)</div>
          <div style={{fontSize:"1.4rem",color:urgentes?"var(--warning)":"var(--text-dim)",fontWeight:"bold",marginTop:"0.2rem"}}>{urgentes}</div>
        </div>
        <div style={{background:vencidos?"rgba(239,68,68,.06)":"rgba(255,255,255,.03)",border:`1px solid ${vencidos?"rgba(239,68,68,.25)":"var(--border)"}`,borderRadius:"10px",padding:"0.8rem"}}>
          <div style={{fontSize:"0.62rem",color:vencidos?"var(--danger)":"var(--text-dim)",textTransform:"uppercase",letterSpacing:"0.08em"}}>Vencidos</div>
          <div style={{fontSize:"1.4rem",color:vencidos?"var(--danger)":"var(--text-dim)",fontWeight:"bold",marginTop:"0.2rem"}}>{vencidos}</div>
        </div>
      </div>

      {/* Alerta de vencidos */}
      {vencidos>0&&(
        <div style={{background:"rgba(239,68,68,.06)",border:"1px solid rgba(239,68,68,.2)",borderRadius:"10px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"0.78rem",color:"var(--danger)"}}>
          {Icons.bell} <strong>{vencidos} prazo(s) vencido(s)!</strong> Atenção: perda de prazo pode gerar preclusão temporal.
        </div>
      )}

      {/* Filtros */}
      <div style={{display:"flex",gap:"0.4rem",marginBottom:"1rem",flexWrap:"wrap"}}>
        {[{k:"ativos",l:"Ativos"},{k:"urgentes",l:`Urgentes${urgentes?` (${urgentes})`:""}`},{k:"vencidos",l:`Vencidos${vencidos?` (${vencidos})`:""}`},{k:"cumpridos",l:"Cumpridos"},{k:"todos",l:"Todos"}].map(f=>(
          <button key={f.k} onClick={()=>setFiltro(f.k)} style={{padding:"0.35rem 0.7rem",borderRadius:"20px",border:`1px solid ${filtro===f.k?"rgba(212,175,55,.4)":"var(--border)"}`,background:filtro===f.k?"var(--gold-bg)":"transparent",color:filtro===f.k?"var(--gold)":"var(--text-dim)",fontSize:"0.86rem",cursor:"pointer"}}>{f.l}</button>
        ))}
      </div>

      {/* Lista de prazos */}
      {filtrados.length===0 ? (
        <div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text-dim)"}}>
          <p style={{fontSize:"0.85rem"}}>Nenhum prazo {filtro!=="todos"?`com filtro "${filtro}"`:""}</p>
          <p style={{fontSize:"0.88rem",marginTop:"0.3rem"}}>Cadastre prazos para controlar vencimentos automaticamente</p>
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
          {filtrados.map(p=>{
            const st = getStatusPrazo(p);
            return (
              <div key={p.id} style={{background:"rgba(255,255,255,.03)",border:`1px solid ${st.cor==="var(--danger)"&&p.status!=="cumprido"?"rgba(239,68,68,.3)":"var(--border)"}`,borderRadius:"10px",padding:"0.8rem 1rem"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"0.5rem"}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
                      <span style={{fontSize:"0.88rem",fontWeight:"500",textDecoration:p.status==="cumprido"?"line-through":"none"}}>{p.tipo||"Prazo"}</span>
                      <span style={{fontSize:"0.55rem",background:st.bg,color:st.cor,padding:"0.08rem 0.5rem",borderRadius:"10px",border:`1px solid ${st.cor}22`,fontWeight:"600"}}>{st.label}</span>
                    </div>
                    {p.observacao&&<p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.15rem"}}>{p.observacao}</p>}
                    <div style={{display:"flex",gap:"0.7rem",marginTop:"0.3rem",fontSize:"0.78rem",color:"var(--text-dim)",flexWrap:"wrap"}}>
                      <span>📅 Intimação: {formatDate(p.dataIntimacao)}</span>
                      <span>⏰ Vencimento: {formatDate(p.vencimento)}</span>
                      <span>📐 {p.diasPrazo}d úteis</span>
                      {p.processoId&&<span>{Icons.processos} {PROCESSOS_CONFIG.find(pr=>pr.id===p.processoId)?.cliente||""}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:"0.3rem",flexShrink:0}}>
                    {p.status!=="cumprido"&&(
                      <button onClick={()=>marcarCumprido(p.id)} title="Marcar como cumprido" style={{background:"rgba(16,185,129,.1)",border:"1px solid rgba(16,185,129,.3)",color:"var(--success)",padding:"0.3rem 0.5rem",borderRadius:"6px",fontSize:"0.78rem",cursor:"pointer"}}>✓ Cumprido</button>
                    )}
                    <button onClick={()=>setModal(p)} style={{background:"none",border:"none",color:"var(--text-dim)",padding:"0.3rem",cursor:"pointer"}}>{Icons.edit}</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {modal&&<PrazoModal prazo={modal} onSave={salvar} onDelete={modal.id?()=>excluir(modal.id):null} onClose={()=>setModal(null)} feriadosCache={feriadosCache}/>}
      {calculadora&&<CalculadoraPrazos onClose={()=>setCalculadora(false)} feriadosCache={feriadosCache}/>}
    </div>
  );
}

function PrazoModal({ prazo, onSave, onDelete, onClose, feriadosCache }) {
  const [form, setForm] = useState(prazo);
  const [tipoSelecionado, setTipoSelecionado] = useState("");
  const upd = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleTipoChange = (valor) => {
    setTipoSelecionado(valor);
    const found = PRAZOS_CPC.find(p=>p.nome===valor);
    if(found && found.dias > 0) {
      upd("tipo", found.nome);
      const novoForm = {...form, tipo:found.nome, diasPrazo:found.dias};
      if(novoForm.dataIntimacao) {
        const venc = calcularVencimentoPrazo(new Date(novoForm.dataIntimacao+"T12:00:00"), found.dias, feriadosCache);
        novoForm.vencimento = venc.toISOString().slice(0,10);
      }
      setForm(novoForm);
    } else if(found && found.dias === 0) {
      upd("tipo", "");
    }
  };

  const recalcular = (dataIntimacao, dias) => {
    if(dataIntimacao && dias > 0) {
      const venc = calcularVencimentoPrazo(new Date(dataIntimacao+"T12:00:00"), dias, feriadosCache);
      setForm(prev=>({...prev, dataIntimacao, diasPrazo:dias, vencimento:venc.toISOString().slice(0,10)}));
    }
  };

  return (
    <Modal title={form.id?"Editar Prazo":"Novo Prazo Processual"} onClose={onClose} width="580px">
      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
        <div>
          <label style={labelStyle}>Tipo de Prazo</label>
          <select value={tipoSelecionado} onChange={e=>handleTipoChange(e.target.value)} style={inputStyle}>
            <option value="">Selecione um prazo do CPC...</option>
            {PRAZOS_CPC.map(p=><option key={p.nome} value={p.nome}>{p.nome}{p.dias>0?` — ${p.dias}d úteis`:""}</option>)}
          </select>
        </div>
        <div><label style={labelStyle}>Descrição do prazo *</label><input value={form.tipo||""} onChange={e=>upd("tipo",e.target.value)} style={inputStyle} placeholder="Ex: Contestação — Processo Bradesco"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"0.7rem"}}>
          <div><label style={labelStyle}>Data da Intimação *</label><input type="date" value={form.dataIntimacao||""} onChange={e=>recalcular(e.target.value, form.diasPrazo)} style={inputStyle}/></div>
          <div><label style={labelStyle}>Dias úteis *</label><input type="number" min="1" value={form.diasPrazo||""} onChange={e=>recalcular(form.dataIntimacao, parseInt(e.target.value)||0)} style={inputStyle}/></div>
          <div><label style={labelStyle}>Vencimento (calc.)</label><input type="date" value={form.vencimento||""} readOnly style={{...inputStyle,background:"rgba(212,175,55,.05)",borderColor:"rgba(212,175,55,.2)"}}/></div>
        </div>
        {form.vencimento&&(
          <div style={{background:"var(--gold-bg)",border:"1px solid rgba(212,175,55,.18)",borderRadius:"8px",padding:"0.6rem 0.8rem",fontSize:"0.78rem",color:"var(--text-mid)"}}>
            ⚖️ Vencimento calculado: <strong style={{color:"var(--gold)"}}>{formatDate(form.vencimento)}</strong> ({form.diasPrazo}d úteis a partir de {formatDate(form.dataIntimacao)}, excluídos feriados, fins de semana e suspensões TJCE)
          </div>
        )}
        <div><label style={labelStyle}>Observação</label><input value={form.observacao||""} onChange={e=>upd("observacao",e.target.value)} style={inputStyle} placeholder="Notas adicionais..."/></div>
        <div><label style={labelStyle}>Processo vinculado</label><select value={form.processoId||""} onChange={e=>upd("processoId",e.target.value)} style={inputStyle}><option value="">Nenhum</option>{PROCESSOS_CONFIG.map(p=><option key={p.id} value={p.id}>{p.cliente} — {p.numero}</option>)}</select></div>
        <div style={{display:"flex",gap:"0.6rem",justifyContent:"flex-end",marginTop:"0.5rem"}}>
          {onDelete&&<button onClick={onDelete} style={{...btnSecondary,color:"var(--danger)",borderColor:"rgba(239,68,68,.3)",marginRight:"auto"}}>Excluir</button>}
          <button onClick={onClose} style={btnSecondary}>Cancelar</button>
          <button onClick={()=>form.tipo&&form.vencimento&&onSave(form)} style={{...btnPrimary,opacity:form.tipo&&form.vencimento?1:.5}}>Salvar</button>
        </div>
      </div>
    </Modal>
  );
}

function CalculadoraPrazos({ onClose, feriadosCache }) {
  const [dataInicio, setDataInicio] = useState("");
  const [dias, setDias] = useState(15);
  const [resultado, setResultado] = useState(null);

  const calcular = () => {
    if(!dataInicio || !dias) return;
    const venc = calcularVencimentoPrazo(new Date(dataInicio+"T12:00:00"), dias, feriadosCache);
    const diasCorridos = Math.ceil((venc - new Date(dataInicio+"T12:00:00"))/(1000*60*60*24));
    setResultado({vencimento:venc, diasCorridos});
  };

  return (
    <Modal title="Calculadora de Prazos (Dias Úteis)" onClose={onClose} width="500px">
      <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
        <div style={{background:"var(--gold-bg)",borderRadius:"8px",padding:"0.6rem 0.8rem",fontSize:"0.78rem",color:"var(--text-mid)"}}>
          ⚖️ Cálculo conforme CPC: arts. 219 (dias úteis), 224 §1º (prorrogação) e 224 §2º (início no primeiro dia útil). Inclui feriados nacionais, estaduais (CE) e suspensões forenses TJCE.
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0.7rem"}}>
          <div><label style={labelStyle}>Data da intimação/publicação</label><input type="date" value={dataInicio} onChange={e=>setDataInicio(e.target.value)} style={inputStyle}/></div>
          <div><label style={labelStyle}>Prazo (dias úteis)</label><input type="number" min="1" value={dias} onChange={e=>setDias(parseInt(e.target.value)||0)} style={inputStyle}/></div>
        </div>
        <div>
          <label style={labelStyle}>Atalhos</label>
          <div style={{display:"flex",gap:"0.3rem",flexWrap:"wrap"}}>
            {[5,10,15,20,30].map(d=>(
              <button key={d} onClick={()=>setDias(d)} style={{padding:"0.3rem 0.6rem",borderRadius:"6px",border:`1px solid ${dias===d?"rgba(212,175,55,.4)":"var(--border)"}`,background:dias===d?"var(--gold-bg)":"transparent",color:dias===d?"var(--gold)":"var(--text-dim)",fontSize:"0.78rem",cursor:"pointer"}}>{d}d</button>
            ))}
          </div>
        </div>
        <button onClick={calcular} style={{...btnPrimary,width:"100%"}}>Calcular Vencimento</button>
        {resultado&&(
          <div style={{background:"rgba(16,185,129,.06)",border:"1px solid rgba(16,185,129,.25)",borderRadius:"10px",padding:"1rem"}}>
            <div style={{fontSize:"0.78rem",color:"var(--text-dim)",marginBottom:"0.3rem"}}>Vencimento do prazo:</div>
            <div style={{fontSize:"1.3rem",color:"var(--success)",fontWeight:"bold"}}>{resultado.vencimento.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
            <div style={{fontSize:"0.78rem",color:"var(--text-dim)",marginTop:"0.4rem"}}>{dias} dias úteis = {resultado.diasCorridos} dias corridos (incluindo feriados e fins de semana)</div>
          </div>
        )}
      </div>
    </Modal>
  );
}

function Dashboard({ setPage }) {
  const tarefas = Storage.get("tarefas",[]);

  const prazos = Storage.get("prazos",[]);
  const feriadosCache = useMemo(()=>buildFeriadosCache(new Date().getFullYear()), []);
  const tarefasVencidas = tarefas.filter(t=>t.status!=="concluida"&&isOverdue(t.prazo));
  const tarefasHoje = tarefas.filter(t=>t.status!=="concluida"&&isToday(t.prazo));
  const cobrancasVencidas = cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento));
  const prazosVencidos = prazos.filter(p=>p.status!=="cumprido"&&diasUteisAte(p.vencimento,feriadosCache)<0);
  const prazosUrgentes = prazos.filter(p=>p.status!=="cumprido"&&diasUteisAte(p.vencimento,feriadosCache)>=0&&diasUteisAte(p.vencimento,feriadosCache)<=3);

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"0.7rem"}}>
          <h3 style={{fontSize:"0.95rem",color:"var(--gold)"}}>Movimentações Recentes</h3>
          <button onClick={()=>setPage("alertas")} style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:"0.86rem",cursor:"pointer"}}>Ver todas →</button>
        </div>
        {movNaoLidas.length>0 ? movNaoLidas.slice(0,4).map(m=>(
          <div key={m.id} style={{display:"flex",justifyContent:"space-between",padding:"0.4rem 0",borderBottom:"1px solid var(--border)",fontSize:"0.82rem",gap:"0.5rem"}}>
            <div style={{flex:1,minWidth:0}}>
              <span style={{color:"var(--gold)",fontWeight:"500"}}>{m.movimentacao}</span>
              <span style={{color:"var(--text-dim)",marginLeft:"0.4rem"}}>{m.cliente}</span>
            </div>
            <span style={{color:"var(--text-dim)",flexShrink:0}}>{m.dataMov}</span>
          </div>
        )) : <p style={{fontSize:"0.9rem",color:"var(--text-dim)"}}>Nenhuma movimentação nova</p>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════════════
// MÓDULO WHATSAPP (waTidy / Wascript)
// ═══════════════════════════════════════════════════════════════════════════════
function ModuloWhatsApp() {
  const [tab, setTab] = useState("texto"); // texto | documento | template | historico
  const [phone, setPhone] = useState("");
  const [message, setMessage] = useState("");
  const [docFile, setDocFile] = useState(null);
  const [enviando, setEnviando] = useState(false);
  const [historico, setHistorico] = useState(()=>Storage.get("wa_historico",[]));
  const [tokenConfigurado, setTokenConfigurado] = useState(()=>!!WaTidy.getToken());
  const cobrancas = Storage.get("cobrancas",[]);
  const contatosRecentes = useMemo(()=>{
    // contatos com telefone das cobranças, deduplicados
    const map = new Map();
    cobrancas.forEach(c=>{ if(c.telefone&&c.clienteNome) map.set(WaTidy.formatPhone(c.telefone), c.clienteNome); });
    return Array.from(map.entries()).slice(0,12).map(([t,n])=>({telefone:t,nome:n}));
  },[cobrancas.length]);

  useEffect(()=>{ const tick = setInterval(()=>setTokenConfigurado(!!WaTidy.getToken()), 1500); return ()=>clearInterval(tick); },[]);

  const addHistorico = (entry) => {
    const e = {...entry, timestamp:new Date().toISOString(), id:genId()};
    const novo = [e, ...historico].slice(0,80);
    setHistorico(novo); Storage.set("wa_historico",novo);
  };

  const enviarTextoHandler = async () => {
    if (!phone.trim()) return alert("Informe o telefone do destinatário.");
    if (!message.trim()) return alert("Digite a mensagem.");
    setEnviando(true);
    try {
      await WaTidy.enviarTexto(phone, message);
      addHistorico({tipo:"texto", phone:WaTidy.formatPhone(phone), preview:message.slice(0,180), status:"enviado"});
      alert("✅ Mensagem enviada!");
      setMessage("");
    } catch(e) {
      addHistorico({tipo:"texto", phone:WaTidy.formatPhone(phone), preview:message.slice(0,180), status:"erro", erro:e.message});
      alert(`❌ Erro: ${e.message}`);
    } finally { setEnviando(false); }
  };

  const enviarDocHandler = async () => {
    if (!phone.trim()) return alert("Informe o telefone do destinatário.");
    if (!docFile) return alert("Selecione um arquivo.");
    setEnviando(true);
    try {
      const base64 = await WaTidy.fileToBase64(docFile);
      // mensagem opcional vai como texto antes
      if (message.trim()) {
        await WaTidy.enviarTexto(phone, message);
      }
      await WaTidy.enviarDocumento(phone, base64, docFile.name);
      addHistorico({tipo:"documento", phone:WaTidy.formatPhone(phone), preview:`📎 ${docFile.name}${message?" + texto":""}`, status:"enviado"});
      alert("✅ Documento enviado!");
      setDocFile(null); setMessage("");
    } catch(e) {
      addHistorico({tipo:"documento", phone:WaTidy.formatPhone(phone), preview:docFile?.name||"", status:"erro", erro:e.message});
      alert(`❌ Erro: ${e.message}`);
    } finally { setEnviando(false); }
  };

  const aplicarTemplate = (t) => { setMessage(t.body); setTab("texto"); };
  const limparHist = () => { if(confirm("Limpar todo o histórico?")) { setHistorico([]); Storage.set("wa_historico",[]); } };

  const tabs = [
    {k:"texto", l:"💬 Mensagem"},
    {k:"documento", l:"📎 Documento"},
    {k:"template", l:"⚡ Templates"},
    {k:"historico", l:"📋 Histórico"},
  ];

  return (
    <div className="fade-in">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1rem",flexWrap:"wrap",gap:"0.5rem"}}>
        <div>
          <h2 style={{fontSize:"1.3rem"}}>WhatsApp</h2>
          <p style={{fontSize:"0.88rem",color:"var(--text-dim)",marginTop:"0.2rem"}}>Envio via waTidy (seu WhatsApp Web já logado)</p>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:"0.4rem",padding:"0.4rem 0.8rem",borderRadius:"20px",background:tokenConfigurado?"rgba(16,185,129,.08)":"rgba(245,158,11,.08)",border:`1px solid ${tokenConfigurado?"rgba(16,185,129,.25)":"rgba(245,158,11,.25)"}`,fontSize:"0.84rem",color:tokenConfigurado?"var(--success)":"var(--warning)"}}>
          <span style={{width:"8px",height:"8px",borderRadius:"50%",background:tokenConfigurado?"var(--success)":"var(--warning)"}}></span>
          {tokenConfigurado?"Token configurado":"Token não configurado"}
        </div>
      </div>

      {!tokenConfigurado && (
        <div style={{background:"rgba(245,158,11,.06)",border:"1px solid rgba(245,158,11,.2)",borderRadius:"10px",padding:"0.9rem 1rem",marginBottom:"1rem",fontSize:"0.9rem",color:"var(--warning)"}}>
          ⚠️ <strong>Configure o token primeiro:</strong> abra <em>Configurações → WhatsApp (waTidy)</em> e cole o token gerado na extensão.
        </div>
      )}

      <div style={{background:"rgba(59,130,246,.05)",border:"1px solid rgba(59,130,246,.15)",borderRadius:"10px",padding:"0.7rem 1rem",marginBottom:"1rem",fontSize:"0.85rem",color:"var(--text-mid)",lineHeight:1.5}}>
        💡 Para a API funcionar, mantenha o <strong>WhatsApp Web aberto no navegador</strong> e a toggle <strong>"Ativar API"</strong> ligada na extensão waTidy.
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:"0.2rem",marginBottom:"1rem",borderBottom:"1px solid var(--border)",overflowX:"auto"}}>
        {tabs.map(t=>(
          <button key={t.k} onClick={()=>setTab(t.k)} style={{padding:"0.6rem 1rem",background:"none",border:"none",borderBottom:`2px solid ${tab===t.k?"var(--gold)":"transparent"}`,color:tab===t.k?"var(--gold)":"var(--text-dim)",fontSize:"0.92rem",cursor:"pointer",whiteSpace:"nowrap"}}>{t.l}</button>
        ))}
      </div>

      {/* Aba: Mensagem de texto */}
      {tab==="texto" && (
        <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
          <div>
            <label style={labelStyle}>Telefone (com DDD)</label>
            <input value={phone} onChange={e=>setPhone(e.target.value)} style={inputStyle} placeholder="85999999999"/>
            {contatosRecentes.length>0 && (
              <div style={{display:"flex",flexWrap:"wrap",gap:"0.3rem",marginTop:"0.4rem"}}>
                <span style={{fontSize:"0.78rem",color:"var(--text-dim)",marginRight:"0.2rem"}}>Recentes:</span>
                {contatosRecentes.map(c=>(
                  <button key={c.telefone} onClick={()=>setPhone(c.telefone)} style={{padding:"0.2rem 0.55rem",borderRadius:"12px",border:"1px solid var(--border)",background:"rgba(255,255,255,.03)",color:"var(--text-dim)",fontSize:"0.78rem",cursor:"pointer"}}>{c.nome}</button>
                ))}
              </div>
            )}
          </div>
          <div>
            <label style={labelStyle}>Mensagem</label>
            <textarea value={message} onChange={e=>setMessage(e.target.value)} style={{...inputStyle,minHeight:"180px",resize:"vertical",fontFamily:"inherit",lineHeight:1.5}} placeholder="Digite sua mensagem..."/>
            <div style={{fontSize:"0.78rem",color:"var(--text-dim)",marginTop:"0.3rem",textAlign:"right"}}>{message.length} caracteres</div>
          </div>
          <div style={{display:"flex",gap:"0.6rem",justifyContent:"flex-end",flexWrap:"wrap"}}>
            <button onClick={()=>{setMessage("");setPhone("");}} style={btnSecondary}>Limpar</button>
            <button onClick={enviarTextoHandler} disabled={enviando||!tokenConfigurado} style={{...btnPrimary,background:"linear-gradient(135deg,#25d366,#128c7e)",opacity:(enviando||!tokenConfigurado)?.5:1,display:"flex",alignItems:"center",gap:"0.4rem"}}>{enviando?"Enviando...":<>{Icons.whatsapp} Enviar</>}</button>
          </div>
        </div>
      )}

      {/* Aba: Documento */}
      {tab==="documento" && (
        <div style={{display:"flex",flexDirection:"column",gap:"0.9rem"}}>
          <div>
            <label style={labelStyle}>Telefone (com DDD)</label>
            <input value={phone} onChange={e=>setPhone(e.target.value)} style={inputStyle} placeholder="85999999999"/>
          </div>
          <div>
            <label style={labelStyle}>Arquivo (PDF, DOCX, XLSX, imagem)</label>
            <input type="file" accept=".pdf,.docx,.doc,.xlsx,.xls,.jpg,.jpeg,.png" onChange={e=>setDocFile(e.target.files[0])} style={{...inputStyle,padding:"0.5rem"}}/>
            {docFile && <p style={{fontSize:"0.86rem",color:"var(--text-dim)",marginTop:"0.4rem"}}>📄 <strong>{docFile.name}</strong> · {(docFile.size/1024).toFixed(0)} KB</p>}
            <p style={{fontSize:"0.78rem",color:"var(--text-dim)",marginTop:"0.3rem"}}>Limite recomendado: ~10 MB. Acima disso o waTidy pode rejeitar.</p>
          </div>
          <div>
            <label style={labelStyle}>Mensagem opcional (vai antes do documento)</label>
            <textarea value={message} onChange={e=>setMessage(e.target.value)} style={{...inputStyle,minHeight:"100px",resize:"vertical",fontFamily:"inherit"}} placeholder="Ex: Segue em anexo a peça processual elaborada..."/>
          </div>
          <div style={{display:"flex",gap:"0.6rem",justifyContent:"flex-end"}}>
            <button onClick={enviarDocHandler} disabled={enviando||!tokenConfigurado||!docFile} style={{...btnPrimary,background:"linear-gradient(135deg,#25d366,#128c7e)",opacity:(enviando||!tokenConfigurado||!docFile)?.5:1}}>{enviando?"Enviando...":"Enviar Documento"}</button>
          </div>
        </div>
      )}

      {/* Aba: Templates */}
      {tab==="template" && (
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"0.7rem"}}>
          {WHATSAPP_TEMPLATES.map(t=>(
            <button key={t.id} onClick={()=>aplicarTemplate(t)} style={{textAlign:"left",background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"10px",padding:"1rem",cursor:"pointer",color:"var(--text)",transition:"border-color .15s"}} onMouseEnter={e=>e.currentTarget.style.borderColor="var(--gold-dim)"} onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border)"}>
              <div style={{fontSize:"1.6rem",marginBottom:"0.3rem"}}>{t.icon}</div>
              <div style={{fontWeight:"500",fontSize:"0.92rem"}}>{t.nome}</div>
              <div style={{fontSize:"0.78rem",color:"var(--text-dim)",marginTop:"0.4rem",lineHeight:1.4,whiteSpace:"pre-wrap",maxHeight:"60px",overflow:"hidden"}}>{t.body.slice(0,120)}{t.body.length>120?"...":""}</div>
            </button>
          ))}
        </div>
      )}

      {/* Aba: Histórico */}
      {tab==="historico" && (
        <div>
          {historico.length>0 && (
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:"0.5rem"}}>
              <button onClick={limparHist} style={{...btnSecondary,fontSize:"0.82rem",padding:"0.4rem 0.8rem"}}>Limpar histórico</button>
            </div>
          )}
          {historico.length===0 ? (
            <div style={{textAlign:"center",padding:"3rem 1rem",color:"var(--text-dim)"}}>
              <p style={{fontSize:"0.92rem"}}>Nenhum envio registrado ainda</p>
              <p style={{fontSize:"0.84rem",marginTop:"0.3rem"}}>Mensagens e documentos enviados aparecerão aqui</p>
            </div>
          ) : (
            <div style={{display:"flex",flexDirection:"column",gap:"0.4rem"}}>
              {historico.map(h=>(
                <div key={h.id} style={{background:"rgba(255,255,255,.03)",border:"1px solid var(--border)",borderRadius:"8px",padding:"0.7rem 0.9rem"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"0.5rem"}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:"0.4rem",flexWrap:"wrap"}}>
                        <span style={{fontSize:"0.92rem",fontWeight:"500"}}>{h.phone}</span>
                        <span style={{fontSize:"0.6rem",padding:"0.08rem 0.4rem",borderRadius:"10px",background:h.status==="enviado"?"rgba(16,185,129,.1)":"rgba(239,68,68,.1)",color:h.status==="enviado"?"var(--success)":"var(--danger)"}}>{h.status==="enviado"?"✓ ENVIADO":"✗ ERRO"}</span>
                        <span style={{fontSize:"0.6rem",color:"var(--text-dim)",textTransform:"uppercase"}}>{h.tipo}</span>
                      </div>
                      <p style={{fontSize:"0.86rem",color:"var(--text-dim)",marginTop:"0.25rem",whiteSpace:"pre-wrap",overflowWrap:"anywhere"}}>{h.preview}</p>
                      {h.erro && <p style={{fontSize:"0.78rem",color:"var(--danger)",marginTop:"0.2rem"}}>↳ {h.erro}</p>}
                    </div>
                    <span style={{fontSize:"0.74rem",color:"var(--text-dim)",whiteSpace:"nowrap"}}>{new Date(h.timestamp).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function App() {
  const [page, setPage] = useState("dashboard");
  const [menuOpen, setMenuOpen] = useState(false);

  const tarefas = Storage.get("tarefas",[]);
  const cobrancas = Storage.get("cobrancas",[]);
  const prazosApp = Storage.get("prazos",[]);
  const novasMovsApp = Storage.get("novasMovs",[]);
  const alertasNaoLidos = novasMovsApp.filter(m=>!m.lida).length;
  const alertCount = tarefas.filter(t=>t.status!=="concluida"&&isOverdue(t.prazo)).length + cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento)).length + prazosApp.filter(p=>p.status!=="cumprido"&&isOverdue(p.vencimento)).length;

  const navItems = [
    {id:"dashboard",label:"Início",icon:Icons.home},
    {id:"processos",label:"Processos",icon:Icons.processos},
    {id:"alertas",label:"Alertas",icon:Icons.alertas},
    {id:"prazos",label:"Prazos",icon:Icons.prazos},
    {id:"tarefas",label:"Tarefas",icon:Icons.tarefas},
    {id:"financeiro",label:"Financeiro",icon:Icons.financeiro},
    {id:"whatsapp",label:"WhatsApp",icon:Icons.whatsappMenu},
    {id:"config",label:"Config",icon:Icons.config},
  ];

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Sidebar Desktop */}
      <aside style={{width:"220px",background:"rgba(5,10,25,.98)",borderRight:"1px solid var(--border)",padding:"1.2rem 0",display:"flex",flexDirection:"column",position:"fixed",top:0,left:0,bottom:0,zIndex:100}}>
        <div style={{padding:"0 1rem",marginBottom:"1.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:"0.6rem"}}>
            <div style={{width:"34px",height:"34px",borderRadius:"8px",background:"linear-gradient(135deg,var(--gold),#9a7d0a)",display:"flex",alignItems:"center",justifyContent:"center",color:"#0a1628"}}>{Icons.balance}</div>
            <div>
              <div style={{fontSize:"0.78rem",fontWeight:"600",color:"var(--text)",lineHeight:1.3}}>Rafael Freitas</div>
              <div style={{fontSize:"0.62rem",color:"var(--gold)",letterSpacing:"0.06em"}}>ADVOCACIA | OAB/CE 44.172</div>
            </div>
          </div>
        </div>
        <nav style={{flex:1}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>setPage(item.id)} style={{width:"100%",display:"flex",alignItems:"center",gap:"0.7rem",padding:"0.75rem 1.2rem",background:page===item.id?"var(--gold-bg)":"transparent",border:"none",borderLeft:page===item.id?"3px solid var(--gold)":"3px solid transparent",color:page===item.id?"var(--gold)":"var(--text-dim)",fontSize:"0.92rem",cursor:"pointer",textAlign:"left",transition:"all .15s",position:"relative"}}>
              <span style={{display:"flex"}}>{item.icon}</span>{item.label}
              {item.id==="alertas"&&alertasNaoLidos>0&&<NotificationBadge count={alertasNaoLidos}/>}
              {item.id==="prazos"&&prazosApp.filter(p=>p.status!=="cumprido"&&isOverdue(p.vencimento)).length>0&&<NotificationBadge count={prazosApp.filter(p=>p.status!=="cumprido"&&isOverdue(p.vencimento)).length}/>}
              {item.id==="financeiro"&&cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento)).length>0&&<NotificationBadge count={cobrancas.filter(c=>c.status==="pendente"&&isOverdue(c.vencimento)).length}/>}
            </button>
          ))}
        </nav>
        <div style={{padding:"0 1rem",fontSize:"0.78rem",color:"var(--text-dim)",lineHeight:1.6}}>
          Rafael Freitas Advocacia<br/>Fortaleza/CE
        </div>
      </aside>

      {/* Mobile Header */}
      <div className="mobile-header" style={{display:"none",position:"fixed",top:0,left:0,right:0,zIndex:200,background:"rgba(5,10,25,.98)",borderBottom:"1px solid var(--border)",padding:"0.7rem 1rem",alignItems:"center",justifyContent:"space-between",backdropFilter:"blur(10px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:"0.5rem"}}>
          <div style={{width:"30px",height:"30px",borderRadius:"6px",background:"linear-gradient(135deg,var(--gold),#9a7d0a)",display:"flex",alignItems:"center",justifyContent:"center",color:"#0a1628"}}>{Icons.balance}</div>
          <span style={{fontSize:"0.88rem",fontWeight:"600"}}>Rafael Freitas Advocacia</span>
        </div>
        <button onClick={()=>setMenuOpen(!menuOpen)} style={{background:"none",border:"none",color:"var(--text)",padding:"4px",position:"relative"}}>
          {menuOpen?Icons.close:Icons.menu}
          {alertCount>0&&!menuOpen&&<NotificationBadge count={alertCount}/>}
        </button>
      </div>

      {/* Mobile Nav Overlay */}
      {menuOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:150,background:"rgba(5,10,25,.97)",paddingTop:"60px"}}>
          {navItems.map(item=>(
            <button key={item.id} onClick={()=>{setPage(item.id);setMenuOpen(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:"0.8rem",padding:"1rem 1.5rem",background:page===item.id?"var(--gold-bg)":"transparent",border:"none",color:page===item.id?"var(--gold)":"var(--text)",fontSize:"1rem",cursor:"pointer",textAlign:"left"}}>
              <span style={{fontSize:"1.3rem"}}>{item.icon}</span>{item.label}
            </button>
          ))}
        </div>
      )}

      {/* Main Content */}
      <main style={{flex:1,marginLeft:"220px",padding:"1.5rem",maxWidth:"900px"}}>
        {page==="dashboard"&&<Dashboard setPage={setPage}/>}
        {page==="processos"&&<MonitorProcessos/>}
        {page==="alertas"&&<AlertasMovimentacao/>}
        {page==="prazos"&&<GestaoPrazos/>}
        {page==="tarefas"&&<GestaoTarefas/>}
        {page==="financeiro"&&<ModuloFinanceiro/>}
        {page==="whatsapp"&&<ModuloWhatsApp/>}
        {page==="config"&&<Configuracoes/>}
      </main>

      {/* Responsive CSS */}
      <style>{`
        @media(max-width:768px){
          aside{display:none!important}
          .mobile-header{display:flex!important}
          main{margin-left:0!important;padding:1rem!important;padding-top:65px!important;max-width:100%!important}
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
